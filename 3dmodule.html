<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MaMoTo – 3D Editor Dev Harness</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",

  }
}

<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0; --surface:#FFFFFF; --surface2:#F0EDE6;
  --border:#D8D4CB; --border-soft:#E8E4DC;
  --text:#1A1814; --text2:#6B6760; --text3:#9E9B95;
  --accent:#2D5A8E; --accent-light:#E8EFF8;
  --red:#B83232; --red-light:#FBE8E8;
  --shadow:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);
  --shadow-xl:0 20px 60px rgba(0,0,0,.18),0 4px 16px rgba(0,0,0,.08);
  --r:10px;
  --font-serif:'DM Serif Display',Georgia,serif;
  --font-sans:'Instrument Sans',system-ui,sans-serif;
  --font-mono:'DM Mono',monospace;
}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);user-select:none}

/* ── Dev chrome ──────────────────────────────────────────────────────────── */
#devbar{
  position:fixed;top:0;left:0;right:0;height:52px;z-index:600;
  background:#1A1814;display:flex;align-items:center;gap:20px;padding:0 20px;
}
#devbar-brand{display:flex;align-items:center;gap:8px;flex-shrink:0}
#devbar-mark{width:28px;height:28px;background:#7B3FA0;border-radius:5px;
  display:flex;align-items:center;justify-content:center}
#devbar-title{font-family:var(--font-serif);font-size:16px;color:#fff}
#devbar-title span{color:#7B3FA0}
#devbar-hint{font-size:11px;color:rgba(255,255,255,.35);font-family:var(--font-mono);margin-left:auto;white-space:nowrap}
#devbody{
  position:fixed;top:52px;left:0;bottom:0;width:340px;
  background:var(--surface);border-right:1px solid var(--border-soft);
  padding:20px;overflow-y:auto;z-index:1;
}
#devbody h3{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  color:var(--text3);margin-bottom:10px}
#devbody .dev-section{margin-bottom:20px}
#item-state{
  font-family:var(--font-mono);font-size:11px;color:var(--text2);line-height:1.7;
  background:var(--bg);border:1px solid var(--border-soft);border-radius:8px;
  padding:10px 12px;overflow-x:auto;white-space:pre-wrap;word-break:break-all;min-height:60px;
}
#dev-thumb{max-width:100%;border-radius:8px;border:1px solid var(--border-soft);
  margin-top:12px;display:block}

/* ── Buttons ─────────────────────────────────────────────────────────────── */
.btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;
  font-size:13px;font-weight:500;font-family:var(--font-sans);cursor:pointer;
  transition:all .15s;border:1px solid transparent;}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border-soft)}
.btn-ghost:hover{background:var(--surface2);color:var(--text);border-color:var(--border)}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{background:#333}
.btn-danger-soft{color:var(--red)!important;border-color:var(--red-light)!important}
.btn-danger-soft:hover{background:var(--red-light)!important}
.btn-model{background:#7B3FA0;color:#fff;border-color:#7B3FA0}
.btn-model:hover{filter:brightness(1.1)}

/* ── Modal ───────────────────────────────────────────────────────────────── */
#modal-overlay{
  position:fixed;inset:0;background:rgba(20,18,14,.5);
  z-index:500;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(3px);
}
#modal-overlay.open{display:flex}
#modal{
  background:var(--surface);border-radius:16px;box-shadow:var(--shadow-xl);
  width:1340px;max-width:98vw;max-height:92vh;
  display:flex;flex-direction:column;overflow:hidden;
  animation:modal-in .2s ease;
}
@keyframes modal-in{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.modal-body{padding:24px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.modal-footer{
  padding:16px 24px;border-top:1px solid var(--border-soft);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
}

/* ── 3D editor layout ────────────────────────────────────────────────────── */
#editor3d-wrap{display:flex;gap:0;height:580px;border:1.5px solid var(--border-soft);border-radius:9px;overflow:hidden;position:relative}
#editor3d-sidebar{
  width:100px;flex-shrink:0;background:var(--surface2);
  border-right:1px solid var(--border-soft);
  display:flex;flex-direction:column;overflow:hidden;
}
#editor3d-sidebar-top{padding:10px;border-bottom:1px solid var(--border-soft);flex-shrink:0}
#editor3d-sidebar-top p{font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.05em;color:var(--text3);margin-bottom:8px}
.shape-add-btn-wrap{display:flex;flex-wrap:wrap;gap:5px}
.shape-add-btn{
  display:flex;align-items:center;justify-content:center;
  width:calc(100% - 4px);padding:6px 4px;border-radius:7px;border:1px solid var(--border-soft);
  background:var(--surface);cursor:pointer;transition:all .12s;
}
.shape-add-btn:hover{background:var(--accent-light);border-color:var(--accent)}
.shape-add-btn:disabled{opacity:.4;cursor:not-allowed}
.shape-add-btn:disabled:hover{background:var(--surface);border-color:var(--border-soft)}
.shape-add-btn.danger{color:var(--red)}
.shape-add-btn.danger:not(:disabled):hover{background:var(--red-light);border-color:var(--red)}
#editor3d-canvas-wrap{flex:1;position:relative;background:#e8eef7;cursor:grab}
#editor3d-canvas-wrap.grabbing{cursor:grabbing}
#editor3d-canvas{width:100%;height:100%;display:block}
/* Floats above editor3d-canvas-wrap as an overlay — slid fully clear except for the
   toggle strip when collapsed, via transform (not width/flex), so the canvas's own
   flex sizing — and therefore the 3D scene's render size and camera — never changes. */
#editor3d-props-pane{
  position:absolute;top:0;right:0;height:100%;display:flex;z-index:5;
  transform:translateX(280px);transition:transform .18s ease;
  box-shadow:-6px 0 16px rgba(0,0,0,.12);
}
#editor3d-props-pane.expanded{transform:translateX(0)}
#editor3d-props-toggle{
  flex-shrink:0;width:18px;border:none;border-left:1px solid var(--border-soft);
  background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;
  color:var(--text3);padding:0;transition:background .12s,color .12s;
}
#editor3d-props-toggle:hover{background:var(--accent-light);color:var(--accent)}
#editor3d-props-toggle svg{transition:transform .18s ease}
#editor3d-props-pane.expanded #editor3d-props-toggle svg{transform:rotate(180deg)}
#editor3d-props{
  width:280px;flex-shrink:0;background:var(--surface2);
  height:100%;box-sizing:border-box;padding:14px;overflow-y:auto;
}
#editor3d-props h3{font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.05em;color:var(--text3);margin-bottom:10px}
.prop-group{margin-bottom:12px}
.prop-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600}
.prop-field{margin-bottom:10px}
.prop-field-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.prop-field-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.prop-field-val{font-size:11px;font-family:var(--font-mono);color:var(--accent);min-width:36px;text-align:right}
.prop-input{
  width:100%;padding:5px 8px;border-radius:6px;border:1.5px solid var(--border-soft);
  font-family:var(--font-mono);font-size:12px;color:var(--text);
  background:var(--surface);outline:none;transition:border-color .12s;margin-bottom:4px;
}
.prop-input:focus{border-color:var(--accent)}
.prop-swatches{display:grid;grid-template-columns:repeat(7,22px);gap:5px;padding:2px 0}
.prop-swatch{
  width:22px;height:22px;border-radius:5px;border:2px solid transparent;
  cursor:pointer;transition:transform .1s,border-color .1s;flex-shrink:0;
}
.prop-swatch:hover{transform:scale(1.15)}
.prop-swatch.active{border-color:var(--text);transform:scale(1.12)}
#editor3d-hint{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(255,255,255,.45);pointer-events:none;white-space:nowrap;
}
#editor3d-empty-props{color:var(--text3);font-size:12px;font-style:italic;margin-top:4px}

/* ── Toast ───────────────────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:24px;left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--text);color:#fff;
  padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;
  opacity:0;transition:opacity .2s,transform .2s;
  z-index:700;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<!-- Dev toolbar -->
<header id="devbar">
  <div id="devbar-brand">
    <div id="devbar-mark">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 7l9-5 9 5v10l-9 5-9-5V7z"/><line x1="12" y1="12" x2="12" y2="22"/><line x1="3" y1="7" x2="12" y2="12"/><line x1="21" y1="7" x2="12" y2="12"/></svg>
    </div>
    <span id="devbar-title">3D Editor <span>Dev</span></span>
  </div>
  <div style="display:flex;gap:8px;flex-shrink:0">
    <button class="btn btn-model" id="open-editor">Open 3D Editor</button>
    <button class="btn btn-ghost" id="reset-item" style="color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.15)">Reset item</button>
  </div>
  <span id="devbar-hint">Inspect <code style="color:rgba(255,255,255,.55)">testItem</code> in console · state shown left</span>
</header>

<!-- Dev state panel -->
<aside id="devbody">
  <div class="dev-section">
    <h3>testItem.shapes</h3>
    <pre id="item-state"></pre>
  </div>
  <!-- Thumbnail injected here after save -->
</aside>

<!-- Modal (same structure as main app) -->
<div id="modal-overlay" role="dialog" aria-modal="true">
  <div id="modal">
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toast" role="status" aria-live="polite"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Icons (only what the 3D editor needs) ────────────────────────────────────
const SVG = {
  check: '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
};
const ico = k => `<span style="display:inline-flex;align-items:center;justify-content:center">${SVG[k]}</span>`;

// ── DOM refs ─────────────────────────────────────────────────────────────────
const overlay     = document.getElementById('modal-overlay');
const modalBody   = document.getElementById('modal-body');
const modalFooter = document.getElementById('modal-footer');

// ── Modal control ─────────────────────────────────────────────────────────────
let _saveOnClose = null;
function openModal()  { overlay.classList.add('open'); }
function closeModal() {
  overlay.classList.remove('open');
  _saveOnClose = null;
  refreshItemDisplay();
}
function registerSaveOnClose(fn) { _saveOnClose = fn; }
overlay.addEventListener('click', e => {
  if (e.target !== overlay) return;
  if (_saveOnClose) _saveOnClose(); else closeModal();
});

// ── Stubs for main-app callbacks ──────────────────────────────────────────────
function renderLibrary() { /* no-op in dev */ }
function rerender()      { refreshItemDisplay(); }
function logUsage(event, detail = {}) { console.log('[usage]', event, detail); }

// ── Toast ─────────────────────────────────────────────────────────────────────
let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2400);
}

// ── Test item ─────────────────────────────────────────────────────────────────
const DEFAULT_SHAPES = [];
let testItem = {
  id: 'dev_model_1',
  type: 'model',
  label: 'Dev Model',
  content: '',
  shapes: JSON.parse(JSON.stringify(DEFAULT_SHAPES)),
  createdAt: Date.now(),
};

function refreshItemDisplay() {
  document.getElementById('item-state').textContent =
    JSON.stringify({ label: testItem.label, shapes: testItem.shapes }, null, 2);
  if (testItem.content) {
    let img = document.getElementById('dev-thumb');
    if (!img) {
      const devbody = document.getElementById('devbody');
      const sec = document.createElement('div');
      sec.className = 'dev-section';
      const h = document.createElement('h3');
      h.textContent = 'Saved thumbnail';
      img = document.createElement('img');
      img.id = 'dev-thumb';
      sec.appendChild(h); sec.appendChild(img);
      devbody.appendChild(sec);
    }
    img.src = testItem.content;
  }
}
refreshItemDisplay();

// ── Deps bundle ───────────────────────────────────────────────────────────────
const deps = {
  modalBody, modalFooter,
  openModal, closeModal,
  renderLibrary, rerender,
  toast, logUsage, ico,
  registerSaveOnClose,
};

// ── Dev controls ──────────────────────────────────────────────────────────────
document.getElementById('open-editor').addEventListener('click', () => {
  open3DEditor(testItem, deps);
});
document.getElementById('reset-item').addEventListener('click', () => {
  testItem.shapes  = JSON.parse(JSON.stringify(DEFAULT_SHAPES));
  testItem.label   = 'Dev Model';
  testItem.content = '';
  const old = document.getElementById('dev-thumb');
  if (old) old.closest('.dev-section').remove();
  refreshItemDisplay();
  toast('Item reset to defaults');
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  3D EDITOR MODULE
//  Source: mathmodel-v1.4.html
//
//  Changes from original (3 only):
//   1. open3DEditor(item)  →  open3DEditor(item, deps = {})
//      Destructures deps at top of function body.
//   2. state._saveAndClose = doSave  →  registerSaveOnClose?.(doSave)
//   3. startModelPreview: returns disposer fn instead of pushing to
//      window._modelPreviewDisposers.
//
//  Reintegration into mathmodel-v1.x.html:
//   • Copy the four functions below back into the main <script type="module">.
//   • Replace the open3DEditor call in openLibItemEditor:
//       open3DEditor(item, {
//         modalBody, modalFooter, openModal, closeModal,
//         renderLibrary, rerender, toast, logUsage, ico,
//         registerSaveOnClose: fn => { state._saveAndClose = fn; },
//       });
//   • Update initModelPreviews to collect the returned disposer:
//       const dispose = startModelPreview(container, item.shapes);
//       window._modelPreviewDisposers.push(dispose);
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function buildSceneMeshes(scene, shapes){
  shapes.forEach(s=>{
    let geo;
    if(s.kind === 'box') geo = new THREE.BoxGeometry(s.sx||1, s.sy||1, s.sz||1);
    else if(s.kind === 'cylinder'){ geo = new THREE.CylinderGeometry(0.5,0.5,1,32); geo.scale(s.sx||1,s.sy||1,s.sz||1); }
    else                 geo = new THREE.SphereGeometry((s.r||0.5), 32, 24);
    const mat = new THREE.MeshLambertMaterial({color: s.color || 0x2D5A8E});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(s.x||0, s.y||0, s.z||0);
    mesh.castShadow = true;
    scene.add(mesh);
  });
  const previewGrid = new THREE.GridHelper(10, 10, 0xaabbcc, 0xccddee);
  previewGrid.material.transparent = true;
  previewGrid.material.opacity = 0.5;
  scene.add(previewGrid);
}

function renderModelThumbnail(shapes){
  const W=300, H=200;
  const renderer = new THREE.WebGLRenderer({antialias:true, preserveDrawingBuffer:true});
  renderer.setSize(W,H);
  const scene = new THREE.Scene(); scene.background = new THREE.Color(0xe8eef7);
  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
  camera.position.set(5,4,6); camera.lookAt(0,0,0);
  scene.add(new THREE.AmbientLight(0xffffff,0.6));
  const dl=new THREE.DirectionalLight(0xffffff,0.9); dl.position.set(5,8,5); scene.add(dl);
  const thumbGrid = new THREE.GridHelper(10,10,0xaabbcc,0xccddee);
  thumbGrid.material.transparent = true; thumbGrid.material.opacity = 0.5;
  scene.add(thumbGrid);
  buildSceneMeshes(scene,shapes);
  renderer.render(scene,camera);
  const dataUrl = renderer.domElement.toDataURL('image/png');
  renderer.dispose();
  return dataUrl;
}

// Returns a disposer function — caller is responsible for storing and calling it.
function startModelPreview(container, shapes){
  const W = container.clientWidth  || 200;
  const H = container.clientHeight || 120;

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled = true;
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xe8eef7);

  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
  camera.position.set(4,3,5);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dLight = new THREE.DirectionalLight(0xffffff, 0.9);
  dLight.position.set(5,8,5); scene.add(dLight);

  buildSceneMeshes(scene, shapes);
  camera.lookAt(0,0,0);
  renderer.render(scene, camera);

  return () => {
    renderer.domElement.remove();
    renderer.dispose();
    scene.traverse(obj=>{ if(obj.geometry) obj.geometry.dispose(); if(obj.material) obj.material.dispose(); });
  };
}

function open3DEditor(item, deps = {}){
  const {
    modalBody, modalFooter,
    openModal, closeModal,
    renderLibrary, rerender,
    toast, logUsage, ico,
    registerSaveOnClose,
  } = deps;

  if(!item.shapes) item.shapes = [];
  let shapes = JSON.parse(JSON.stringify(item.shapes));
  let selectedIdx = null;
  let _gizmoMode = 'translate';
  let renderer3d = null, scene3d = null, camera3d = null, controls3d = null;
  let meshes = [];
  let _clipboard = null;
  let _undoStack = [];
  let _redoStack = [];
  let _dragUndoPushed = false;

  modalBody.innerHTML =
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">' +
    '<label style="font-size:12px;font-weight:600;color:var(--text2)">Label</label>' +
    '<input id="item-label" type="text" maxlength="60" placeholder="Name this model" ' +
    'style="flex:1;padding:5px 10px;border-radius:6px;border:1.5px solid var(--border-soft);font-family:var(--font-sans);font-size:13px;outline:none;background:var(--bg)" ' +
    'value="' + (item.label||'').replace(/"/g,'&quot;') + '">' +
    '</div>' +
    '<div id="editor3d-wrap">' +
      '<div id="editor3d-sidebar">' +
        '<div id="editor3d-sidebar-top">' +
          '<p>Add shape</p>' +
          '<div class="shape-add-btn-wrap">' +
          '<button class="shape-add-btn" id="add-box" title="Add Cuboid"><svg width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg"><defs><linearGradient id="cgt" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#ddeeff"/><stop offset="100%" stop-color="#aaccee"/></linearGradient><linearGradient id="cgr" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#6699cc"/><stop offset="100%" stop-color="#2255aa"/></linearGradient><linearGradient id="cgl" x1="0%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#3366aa"/><stop offset="100%" stop-color="#112244"/></linearGradient></defs><polygon points="14,3 24,8 14,13 4,8" fill="url(#cgt)"/><polygon points="24,8 24,20 14,25 14,13" fill="url(#cgr)"/><polygon points="4,8 14,13 14,25 4,20" fill="url(#cgl)"/></svg></button>' +
          '<button class="shape-add-btn" id="add-sphere" title="Add Sphere"><svg width="28" height="28" viewBox="0 0 28 28" xmlns="http://www.w3.org/2000/svg"><defs><radialGradient id="sg" cx="38%" cy="35%" r="60%"><stop offset="0%" stop-color="#ffbbbb"/><stop offset="100%" stop-color="#cc2222"/></radialGradient></defs><g transform="translate(1.4, 1.4) scale(0.9)"><circle cx="14" cy="14" r="11" fill="url(#sg)" stroke="#cc2222" stroke-width="1"/><ellipse cx="11" cy="10" rx="4" ry="2.5" fill="white" fill-opacity="0.35" transform="rotate(-30,11,10)"/></g></svg></button>' +

    '</div>';

  const origShapes = JSON.parse(JSON.stringify(item.shapes));
  const origLabel  = item.label || '';

  function doSave(){
    item.shapes  = JSON.parse(JSON.stringify(shapes));
    item.label   = document.getElementById('item-label').value || '3D Model';
    item.content = renderModelThumbnail(shapes);
    teardown3d();
    closeModal(); renderLibrary(); rerender();
    logUsage('model_save',{id:item.id, shapeCount:shapes.length, durationMs:Date.now()-_modelOpenedAt});
    toast('Saved');
  }
  function doDiscard(){
    item.shapes = origShapes; item.label = origLabel;
    logUsage('model_discard',{id:item.id, durationMs:Date.now()-_modelOpenedAt});
    teardown3d(); closeModal();
  }
  registerSaveOnClose?.(doSave); // was: state._saveAndClose = doSave

  modalFooter.innerHTML =
    `<button class="btn btn-primary" id="save-model">${ico('check')}Save</button>` +
    '<button class="btn btn-ghost btn-danger-soft" id="discard-model">Discard changes</button>';
  openModal();

  // ── Three.js setup ──────────────────────────────────────────────────────────
  const canvasWrap3d = document.getElementById('editor3d-canvas-wrap');
  const canvas3d     = document.getElementById('editor3d-canvas');
  const W = canvasWrap3d.clientWidth  || 440;
  const H = canvasWrap3d.clientHeight || 480;

  renderer3d = new THREE.WebGLRenderer({canvas: canvas3d, antialias:true});
  // updateStyle=false: leave the canvas's CSS box (width:100%/height:100% from the
  // stylesheet) alone and only set the internal render-resolution attributes. Otherwise
  // setSize writes an inline pixel width that fights the flex layout — the canvas-wrap is
  // a flex item with the default min-width:auto, so a fixed-width canvas child can lock
  // in a "minimum content width" on it, which then refuses to shrink when the properties
  // panel tries to expand into that space.
  renderer3d.setSize(W, H, false);
  renderer3d.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer3d.shadowMap.enabled = true;
  renderer3d.shadowMap.type = THREE.PCFSoftShadowMap;

  scene3d = new THREE.Scene();
  scene3d.background = new THREE.Color(0xe8eef7);
  scene3d.fog = new THREE.FogExp2(0xe8eef7, 0.03);

  camera3d = new THREE.PerspectiveCamera(45, W/H, 0.1, 200);
  camera3d.position.set(0, 4.5, 11);
  camera3d.lookAt(0, 0, 0);

  controls3d = new OrbitControls(camera3d, renderer3d.domElement);
  controls3d.enableDamping = true;
  controls3d.dampingFactor = 0.08;
  controls3d.rotateSpeed = 0.5;
  controls3d.minDistance = 1;
  controls3d.maxDistance = 60;
  controls3d.target.set(0, 0, 0);
  controls3d.update();

  // The properties panel starts collapsed and the canvas-wrap is flex:1, so toggling it
  // (or any future container resize) changes the canvas's actual pixel size — without
  // this, the renderer keeps rendering at its init-time resolution and the canvas element
  // just gets stretched/squished via CSS to fit, distorting the 3D view.
  const propsPane   = document.getElementById('editor3d-props-pane');
  const propsToggle = document.getElementById('editor3d-props-toggle');
  propsToggle.addEventListener('click', ()=>{
    const expanded = propsPane.classList.toggle('expanded');
    propsToggle.title = expanded ? 'Hide properties' : 'Show properties';
  });
  const resizeObserver3d = new ResizeObserver(()=>{
    const w = canvasWrap3d.clientWidth, h = canvasWrap3d.clientHeight;
    if(!w || !h) return;
    camera3d.aspect = w/h;
    camera3d.updateProjectionMatrix();
    renderer3d.setSize(w, h, false);
  });
  resizeObserver3d.observe(canvasWrap3d);

  scene3d.add(new THREE.AmbientLight(0xffffff, 0.5));
  const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
  sunLight.position.set(8,12,8); sunLight.castShadow = true;
  sunLight.shadow.mapSize.width = sunLight.shadow.mapSize.height = 1024;
  scene3d.add(sunLight);
  scene3d.add(new THREE.HemisphereLight(0x8888cc, 0x444422, 0.4));

  scene3d.add(new THREE.GridHelper(20, 20, 0x6699cc, 0x99bbdd));
  const groundGeo = new THREE.PlaneGeometry(20,20);
  const groundMat = new THREE.MeshBasicMaterial({
    color: 0xaaccee, transparent: true, opacity: 0.35,
    side: THREE.DoubleSide, depthWrite: false
  });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI/2; ground.receiveShadow = true;
  scene3d.add(ground);

  // ── Mesh management ─────────────────────────────────────────────────────────
  let axisArrows   = [];
  let scaleHandles = [];

  function clearArrows(){
    axisArrows.forEach(g=>{
      (g._visuals||[]).forEach(v=>{ scene3d.remove(v); v.geometry.dispose(); v.material.dispose(); });
      (g._proxies||[]).forEach(p=>{ scene3d.remove(p); p.geometry.dispose(); p.material.dispose(); });
    });
    axisArrows = [];
  }
  function clearScaleHandles(){
    scaleHandles.forEach(h=>{
      (h._visuals||[]).forEach(v=>{ scene3d.remove(v); v.geometry.dispose(); v.material.dispose(); });
      if(h._proxy){ scene3d.remove(h._proxy); h._proxy.geometry.dispose(); h._proxy.material.dispose(); }
    });
    scaleHandles = [];
  }

  // Canonical shape dimensions for both kinds: a box's sx/sy/sz default to 1 if unset; a
  // sphere's default to its legacy radius field (2r) until the first deform bakes real
  // sx/sy/sz onto it. Once set, sx/sy/sz are authoritative for either kind.
  function dimX(s){ return s.sx || (s.kind==='sphere' ? (s.r||0.5)*2 : 1); }
  function dimY(s){ return s.sy || (s.kind==='sphere' ? (s.r||0.5)*2 : 1); }
  function dimZ(s){ return s.sz || (s.kind==='sphere' ? (s.r||0.5)*2 : 1); }

  function getFootprintAABB(s){
    const sW=dimX(s), sD=dimZ(s);
    const cx=(s.x||0)+sW*0.5, cz=(s.z||0)+sD*0.5;
    const q=new THREE.Quaternion().setFromEuler(
      new THREE.Euler((s.rx||0)*Math.PI/180,(s.ry||0)*Math.PI/180,(s.rz||0)*Math.PI/180,'ZYX'));
    let minX=Infinity,maxX=-Infinity,minZ=Infinity,maxZ=-Infinity;
    if(s.customPositions){
      const p=s.customPositions; const v=new THREE.Vector3();
      for(let k=0;k<p.length/3;k++){
        v.set(p[k*3],p[k*3+1],p[k*3+2]).applyQuaternion(q);
        const wx=cx+v.x, wz=cz+v.z;
        if(wx<minX) minX=wx; if(wx>maxX) maxX=wx;
        if(wz<minZ) minZ=wz; if(wz>maxZ) maxZ=wz;
      }
    } else if(s.kind==='sphere'){
      // Closed-form extent of a (possibly rotated) ellipsoid along a world axis: rotate
      // the axis into local space (inverse rotation), weight each local component by its
      // semi-axis, then take the vector length — the ellipsoid analogue of the box's
      // 8-corner loop, exact because an ellipsoid's extent in any direction d is
      // ||diag(hx,hy,hz) * R^-1 * d||.
      const sH=dimY(s);
      const qInv=q.clone().conjugate();
      const wx=new THREE.Vector3(1,0,0).applyQuaternion(qInv);
      const wz=new THREE.Vector3(0,0,1).applyQuaternion(qInv);
      const extX=Math.sqrt((sW*0.5*wx.x)**2+(sH*0.5*wx.y)**2+(sD*0.5*wx.z)**2);
      const extZ=Math.sqrt((sW*0.5*wz.x)**2+(sH*0.5*wz.y)**2+(sD*0.5*wz.z)**2);
      minX=cx-extX; maxX=cx+extX; minZ=cz-extZ; maxZ=cz+extZ;
    } else {
      const sH=dimY(s);
      const hx=sW*0.5,hy=sH*0.5,hz=sD*0.5;
      for(let xi=-1;xi<=1;xi+=2) for(let yi=-1;yi<=1;yi+=2) for(let zi=-1;zi<=1;zi+=2){
        const v=new THREE.Vector3(xi*hx,yi*hy,zi*hz).applyQuaternion(q);
        if(cx+v.x<minX) minX=cx+v.x; if(cx+v.x>maxX) maxX=cx+v.x;
        if(cz+v.z<minZ) minZ=cz+v.z; if(cz+v.z>maxZ) maxZ=cz+v.z;
      }
    }
    return {x0:minX,z0:minZ,x1:maxX,z1:maxZ};
  }

  function getMinObjY(s){
    if(s.customPositions){
      const cy=(s.y||0)+dimY(s)*0.5;
      const q=new THREE.Quaternion().setFromEuler(
        new THREE.Euler((s.rx||0)*Math.PI/180,(s.ry||0)*Math.PI/180,(s.rz||0)*Math.PI/180,'ZYX'));
      const p=s.customPositions; let minY=Infinity; const v=new THREE.Vector3();
      for(let k=0;k<p.length/3;k++){
        v.set(p[k*3],p[k*3+1],p[k*3+2]).applyQuaternion(q);
        if(cy+v.y<minY) minY=cy+v.y;
      }
      return minY;
    }
    const sW=dimX(s), sH=dimY(s), sD=dimZ(s);
    const posY=(s.y||0)+sH*0.5;
    const q=new THREE.Quaternion().setFromEuler(
      new THREE.Euler((s.rx||0)*Math.PI/180,(s.ry||0)*Math.PI/180,(s.rz||0)*Math.PI/180,'ZYX'));
    if(s.kind==='sphere'){
      const w=new THREE.Vector3(0,1,0).applyQuaternion(q.clone().conjugate());
      const ext=Math.sqrt((sW*0.5*w.x)**2+(sH*0.5*w.y)**2+(sD*0.5*w.z)**2);
      return posY-ext;
    }
    let minY=Infinity;
    for(let xi=-1;xi<=1;xi+=2) for(let yi=-1;yi<=1;yi+=2) for(let zi=-1;zi<=1;zi+=2){
      const v=new THREE.Vector3(xi*sW*0.5,yi*sH*0.5,zi*sD*0.5).applyQuaternion(q);
      if(posY+v.y<minY) minY=posY+v.y;
    }
    return minY;
  }

  function getMaxObjY(s){
    if(s.customPositions){
      const cy=(s.y||0)+dimY(s)*0.5;
      const q=new THREE.Quaternion().setFromEuler(
        new THREE.Euler((s.rx||0)*Math.PI/180,(s.ry||0)*Math.PI/180,(s.rz||0)*Math.PI/180,'ZYX'));
      const p=s.customPositions; let maxY=-Infinity; const v=new THREE.Vector3();
      for(let k=0;k<p.length/3;k++){
        v.set(p[k*3],p[k*3+1],p[k*3+2]).applyQuaternion(q);
        if(cy+v.y>maxY) maxY=cy+v.y;
      }
      return maxY;
    }
    const sW=dimX(s), sH=dimY(s), sD=dimZ(s);
    const posY=(s.y||0)+sH*0.5;
    const q=new THREE.Quaternion().setFromEuler(
      new THREE.Euler((s.rx||0)*Math.PI/180,(s.ry||0)*Math.PI/180,(s.rz||0)*Math.PI/180,'ZYX'));
    if(s.kind==='sphere'){
      const w=new THREE.Vector3(0,1,0).applyQuaternion(q.clone().conjugate());
      const ext=Math.sqrt((sW*0.5*w.x)**2+(sH*0.5*w.y)**2+(sD*0.5*w.z)**2);
      return posY+ext;
    }
    let maxY=-Infinity;
    for(let xi=-1;xi<=1;xi+=2) for(let yi=-1;yi<=1;yi+=2) for(let zi=-1;zi<=1;zi+=2){
      const v=new THREE.Vector3(xi*sW*0.5,yi*sH*0.5,zi*sD*0.5).applyQuaternion(q);
      if(posY+v.y>maxY) maxY=posY+v.y;
    }
    return maxY;
  }

  function applyHeightDeform(s, startMinObjY, startMaxObjY, targetMaxObjY, origPositions){
    const newH = Math.max(0.05, targetMaxObjY - startMinObjY);
    const oldH = Math.max(0.001, startMaxObjY - startMinObjY);
    const scaleY = newH / oldH;
    const cx=(s.x||0)+dimX(s)*0.5, cy=(s.y||0)+dimY(s)*0.5, cz=(s.z||0)+dimZ(s)*0.5;
    const q=new THREE.Quaternion().setFromEuler(
      new THREE.Euler((s.rx||0)*Math.PI/180,(s.ry||0)*Math.PI/180,(s.rz||0)*Math.PI/180,'ZYX'));
    const mw=new THREE.Matrix4().compose(new THREE.Vector3(cx,cy,cz),q,new THREE.Vector3(1,1,1));
    const mwInv=mw.clone().invert();
    const n=origPositions.length/3;
    const deformed=new Float32Array(origPositions.length);
    const v=new THREE.Vector3();
    for(let k=0;k<n;k++){
      v.set(origPositions[k*3],origPositions[k*3+1],origPositions[k*3+2]);
      v.applyMatrix4(mw);
      v.y=startMinObjY+scaleY*Math.max(0,v.y-startMinObjY);
      v.applyMatrix4(mwInv);
      deformed[k*3]=v.x; deformed[k*3+1]=v.y; deformed[k*3+2]=v.z;
    }
    s.customPositions=deformed;
    s.customYMin=startMinObjY;
    s.customYMax=startMinObjY+newH;
  }

  // Bake visual height into s.sy/s.y and re-center customPositions so they remain
  // valid after the mesh pivot moves. Must be called before clearing customPositions
  // or before rebuildMeshes uses s.sy for ring radius / box height.
  function bakeHeightDeform(s){
    if(!s.customPositions||s.customYMin===undefined||s.customYMax===undefined) return;
    const visH=s.customYMax-s.customYMin;
    const old_cy=(s.y||0)+dimY(s)*0.5;
    const new_cy=s.customYMin+visH*0.5;
    const delta_cy=old_cy-new_cy;
    if(Math.abs(delta_cy)>1e-9){
      const q=new THREE.Quaternion().setFromEuler(
        new THREE.Euler((s.rx||0)*Math.PI/180,(s.ry||0)*Math.PI/180,(s.rz||0)*Math.PI/180,'ZYX'));
      const shift=new THREE.Vector3(0,delta_cy,0).applyQuaternion(q.clone().conjugate());
      const p=s.customPositions;
      for(let k=0;k<p.length/3;k++){p[k*3]+=shift.x;p[k*3+1]+=shift.y;p[k*3+2]+=shift.z;}
    }
    s.sy=parseFloat(visH.toFixed(3));
    s.y=parseFloat(s.customYMin.toFixed(3));
  }

  // Vertex-level world-space XZ scaling, anchored at a fixed world corner (anchorX,anchorZ).
  // World Y of every vertex is left untouched, so absolute height never changes — for a
  // tilted box this warps the footprint into a general prism instead of a rectangular box.
  function applyFootprintDeform(s, anchorX, anchorZ, scaleX, scaleZ, origPositions){
    const keepYMin=getMinObjY(s), keepYMax=getMaxObjY(s);
    const cx=(s.x||0)+dimX(s)*0.5, cy=(s.y||0)+dimY(s)*0.5, cz=(s.z||0)+dimZ(s)*0.5;
    const q=new THREE.Quaternion().setFromEuler(
      new THREE.Euler((s.rx||0)*Math.PI/180,(s.ry||0)*Math.PI/180,(s.rz||0)*Math.PI/180,'ZYX'));
    const mw=new THREE.Matrix4().compose(new THREE.Vector3(cx,cy,cz),q,new THREE.Vector3(1,1,1));
    const mwInv=mw.clone().invert();
    const n=origPositions.length/3;
    const deformed=new Float32Array(origPositions.length);
    const v=new THREE.Vector3();
    for(let k=0;k<n;k++){
      v.set(origPositions[k*3],origPositions[k*3+1],origPositions[k*3+2]);
      v.applyMatrix4(mw);
      v.x=anchorX+scaleX*(v.x-anchorX);
      v.z=anchorZ+scaleZ*(v.z-anchorZ);
      v.applyMatrix4(mwInv);
      deformed[k*3]=v.x; deformed[k*3+1]=v.y; deformed[k*3+2]=v.z;
    }
    s.customPositions=deformed;
    s.customYMin=keepYMin;
    s.customYMax=keepYMax;
    s._footprintDeformed=true;
  }

  // Bake visual footprint (AABB) into s.sx/s.sz/s.x/s.z and re-center customPositions,
  // mirroring bakeHeightDeform. Gated on _footprintDeformed so a box that only ever had a
  // height deform (still a symmetric footprint) never gets its true sx/sz overwritten by
  // an unrelated rotated-AABB measurement.
  function bakeFootprintDeform(s){
    if(!s.customPositions||!s._footprintDeformed) return;
    const {x0,z0,x1,z1}=getFootprintAABB(s);
    const visW=x1-x0, visD=z1-z0;
    const old_cx=(s.x||0)+dimX(s)*0.5, old_cz=(s.z||0)+dimZ(s)*0.5;
    const new_cx=x0+visW*0.5, new_cz=z0+visD*0.5;
    const delta_cx=old_cx-new_cx, delta_cz=old_cz-new_cz;
    if(Math.abs(delta_cx)>1e-9||Math.abs(delta_cz)>1e-9){
      const q=new THREE.Quaternion().setFromEuler(
        new THREE.Euler((s.rx||0)*Math.PI/180,(s.ry||0)*Math.PI/180,(s.rz||0)*Math.PI/180,'ZYX'));
      const shift=new THREE.Vector3(delta_cx,0,delta_cz).applyQuaternion(q.clone().conjugate());
      const p=s.customPositions;
      for(let k=0;k<p.length/3;k++){p[k*3]+=shift.x;p[k*3+1]+=shift.y;p[k*3+2]+=shift.z;}
    }
    s.sx=parseFloat(visW.toFixed(3));
    s.sz=parseFloat(visD.toFixed(3));
    s.x=parseFloat(x0.toFixed(3));
    s.z=parseFloat(z0.toFixed(3));
  }

  function rebuildMeshes(){
    meshes.forEach(m=>{ scene3d.remove(m); m.geometry.dispose(); m.material.dispose(); });
    meshes = [];
    clearArrows();
    clearScaleHandles();
    shapes.forEach((s,i)=>{
      let geo;
      if(s.kind==='box'){
        geo=new THREE.BoxGeometry(dimX(s),dimY(s),dimZ(s));
      } else if(s.kind==='cylinder'){
        geo=new THREE.CylinderGeometry(0.5,0.5,1,32);
        geo.scale(dimX(s),dimY(s),dimZ(s));
      } else {
        // Unit sphere, scaled to the shape's true dimensions — bakes sx/sy/sz into the
        // vertex positions directly (same idea as BoxGeometry(sx,sy,sz)), so a non-uniform
        // scale produces an ellipsoid. BufferGeometry.scale also updates normals correctly
        // for non-uniform scale (via the normal matrix), so lighting stays correct.
        geo=new THREE.SphereGeometry(0.5,32,24);
        geo.scale(dimX(s),dimY(s),dimZ(s));
      }
      if(s.customPositions&&s.customPositions.length===geo.attributes.position.array.length){
        geo.attributes.position.array.set(s.customPositions);
        geo.attributes.position.needsUpdate=true;
        geo.computeVertexNormals();
      }
      const col = parseInt((s.color||'#2D5A8E').replace('#',''), 16);
      const mat = new THREE.MeshLambertMaterial({ color: col });
      const mesh = new THREE.Mesh(geo, mat);
      const sW_r = dimX(s), sH_r = dimY(s), sD_r = dimZ(s);
      mesh.position.set((s.x||0)+sW_r*0.5, (s.y||0)+sH_r*0.5, (s.z||0)+sD_r*0.5);
      mesh.rotation.set(
        (s.rx||0)*Math.PI/180,
        (s.ry||0)*Math.PI/180,
        (s.rz||0)*Math.PI/180,
        'ZYX'
      );
      mesh.castShadow = true; mesh.receiveShadow = true;
      mesh.userData.shapeIdx = i;
      scene3d.add(mesh); meshes.push(mesh);

      const r=(col>>16)&0xff, g=(col>>8)&0xff, b=col&0xff;
      const lr=Math.round(r+(255-r)*0.55);
      const lg=Math.round(g+(255-g)*0.55);
      const lb=Math.round(b+(255-b)*0.55);
      const edgeCol=(lr<<16)|(lg<<8)|lb;
      if(s.kind==='box'){
        const edgeMat = new THREE.LineBasicMaterial({color:edgeCol});
        const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), edgeMat);
        edges.position.copy(mesh.position);
        edges.rotation.copy(mesh.rotation);
        edges.raycast = ()=>{};
        scene3d.add(edges); meshes.push(edges);
      }
    });

    if(selectedIdx !== null && selectedIdx < shapes.length){
      const s = shapes[selectedIdx];
      const sW = dimX(s), sH = dimY(s), sD = dimZ(s);
      const maxObjY=getMaxObjY(s);
      const minObjY=getMinObjY(s);
      const _aabb=s.customPositions?getFootprintAABB(s):null;
      const pos = new THREE.Vector3(
        _aabb?(_aabb.x0+_aabb.x1)*0.5:(s.x||0)+sW*0.5,
        _aabb?(minObjY+maxObjY)*0.5:(s.y||0)+sH*0.5,
        _aabb?(_aabb.z0+_aabb.z1)*0.5:(s.z||0)+sD*0.5);
      const extX = sW*0.5+0.6;
      const extY = maxObjY - pos.y + 0.6;
      const extZ = sD*0.5+0.6;
      const axisDefs = [
        {dir:new THREE.Vector3(1,0,0), len:extX, col:0xff3333, axisName:'x'},
        {dir:new THREE.Vector3(0,1,0), len:extY, col:0x33cc33, axisName:'y'},
        {dir:new THREE.Vector3(0,0,1), len:extZ, col:0x3399ff, axisName:'z'},
      ];

      if(_gizmoMode!=='rotate'){
      const {x0,z0,x1,z1}=_aabb||getFootprintAABB(s);
      const midX=(x0+x1)*0.5, midZ=(z0+z1)*0.5;
      const shapeCol=parseInt((s.color||'#2D5A8E').replace('#',''),16);

      (()=>{
        const pts=[
          new THREE.Vector3(x0,0,z0),new THREE.Vector3(x1,0,z0),
          new THREE.Vector3(x1,0,z1),new THREE.Vector3(x0,0,z1),
          new THREE.Vector3(x0,0,z0),
        ];
        const solidLine=new THREE.Line(
          new THREE.BufferGeometry().setFromPoints(pts),
          new THREE.LineBasicMaterial({color:shapeCol,linewidth:2})
        );
        scene3d.add(solidLine);
        scaleHandles.push({_visuals:[solidLine],_proxy:null});
      })();

      const bottomY=getMinObjY(s);
      (()=>{
        const pts=[
          new THREE.Vector3(x0,bottomY,z0),new THREE.Vector3(x1,bottomY,z0),
          new THREE.Vector3(x1,bottomY,z1),new THREE.Vector3(x0,bottomY,z1),
          new THREE.Vector3(x0,bottomY,z0),
        ];
        const mat=new THREE.LineDashedMaterial({color:shapeCol,linewidth:1,dashSize:0.18,gapSize:0.10,depthTest:false});
        const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),mat);
        line.computeLineDistances(); line.renderOrder=1;
        scene3d.add(line);
        scaleHandles.push({_visuals:[line],_proxy:null});
      })();

      const HSIZE=0.13;
      [{cx:x0,cz:z0,ax:x1,az:z1},{cx:x1,cz:z0,ax:x0,az:z1},
       {cx:x1,cz:z1,ax:x0,az:z0},{cx:x0,cz:z1,ax:x1,az:z0}].forEach(({cx,cz,ax,az})=>{
        const visMat=new THREE.MeshLambertMaterial({color:0x111111,depthTest:false});
        const vis=new THREE.Mesh(new THREE.BoxGeometry(HSIZE,HSIZE,HSIZE),visMat);
        vis.position.set(cx,bottomY,cz); vis.raycast=()=>{};
        vis.renderOrder=2; scene3d.add(vis);
        const proxy=new THREE.Mesh(
          new THREE.BoxGeometry(HSIZE*2.2,HSIZE*2.2,HSIZE*2.2),
          new THREE.MeshBasicMaterial({visible:false}));
        proxy.position.set(cx,bottomY,cz);
        proxy.userData={isScaleHandle:true, anchorX:ax, anchorZ:az};
        scene3d.add(proxy);
        scaleHandles.push({_visuals:[vis],_proxy:proxy,setColor(c){visMat.color.setHex(c);}});
      });

      const topY=maxObjY;
      (()=>{
        const pts=[new THREE.Vector3(midX,bottomY,midZ), new THREE.Vector3(midX,topY,midZ)];
        const mat=new THREE.LineDashedMaterial({color:shapeCol,linewidth:1,dashSize:0.12,gapSize:0.07,depthTest:false});
        const line=new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),mat);
        line.computeLineDistances(); line.renderOrder=1;
        scene3d.add(line);
        scaleHandles.push({_visuals:[line],_proxy:null});
      })();
      (()=>{
        const visMat=new THREE.MeshLambertMaterial({color:0x111111,depthTest:false});
        const vis=new THREE.Mesh(new THREE.BoxGeometry(HSIZE,HSIZE,HSIZE),visMat);
        vis.position.set(midX,topY,midZ); vis.raycast=()=>{};
        vis.renderOrder=2; scene3d.add(vis);
        const proxy=new THREE.Mesh(
          new THREE.BoxGeometry(HSIZE*2.2,HSIZE*2.2,HSIZE*2.2),
          new THREE.MeshBasicMaterial({visible:false}));
        proxy.position.set(midX,topY,midZ);
        proxy.userData={isHeightHandle:true, startTopY:topY};
        scene3d.add(proxy);
        scaleHandles.push({_visuals:[vis],_proxy:proxy,
          setColor(c){visMat.color.setHex(c);}});
      })();
      } // end if(_gizmoMode!=='rotate')

      if(_gizmoMode==='translate'){
        (()=>{
          const dir=new THREE.Vector3(0,1,0), axisName='y';
          const BLACK=0x111111;
          const mat=new THREE.MeshLambertMaterial({color:BLACK});
          const CONE_H=0.27, CONE_R=0.105, shaftLen=0.3;
          const base=new THREE.Vector3(pos.x, maxObjY+0.265, pos.z);
          const shaft=new THREE.Mesh(new THREE.CylinderGeometry(0.025,0.025,shaftLen,8),mat);
          shaft.position.copy(base).addScaledVector(dir,shaftLen*0.5);
          shaft.raycast=()=>{}; scene3d.add(shaft);
          const cone=new THREE.Mesh(new THREE.CylinderGeometry(0,CONE_R,CONE_H,12),mat);
          cone.position.copy(base).addScaledVector(dir,shaftLen+CONE_H*0.5);
          cone.raycast=()=>{}; scene3d.add(cone);
          const proxy=new THREE.Mesh(
            new THREE.CylinderGeometry(0.09,0.09,CONE_H*1.4,6),
            new THREE.MeshBasicMaterial({visible:false}));
          proxy.position.copy(base).addScaledVector(dir,shaftLen+CONE_H*0.5);
          proxy.userData={isGizmo:true,arrowIdx:0,axisName};
          scene3d.add(proxy);
          axisArrows.push({_visuals:[shaft,cone],_proxies:[proxy],_col:BLACK,_hoverCol:0x555555,
            setColor(c){mat.color.setHex(c);}});
        })();
      } else {
        const _visH=s.customYMax!==undefined&&s.customYMin!==undefined
          ?s.customYMax-s.customYMin:dimY(s);
        const RING_R=Math.sqrt((dimX(s)**2+_visH**2+dimZ(s)**2)/4)+0.5;
        const TUBE_R=0.045, PROXY_R=0.11, SEG=64;
        axisDefs.forEach(({col,axisName},ai)=>{
          const visMat=new THREE.MeshLambertMaterial({color:col,side:THREE.DoubleSide});
          const ring=new THREE.Mesh(new THREE.TorusGeometry(RING_R,TUBE_R,12,SEG),visMat);
          const proxy=new THREE.Mesh(
            new THREE.TorusGeometry(RING_R,PROXY_R,6,SEG),
            new THREE.MeshBasicMaterial({visible:false,side:THREE.DoubleSide}));
          if(axisName==='x'){ring.rotation.y=Math.PI/2; proxy.rotation.y=Math.PI/2;}
          if(axisName==='y'){ring.rotation.x=Math.PI/2; proxy.rotation.x=Math.PI/2;}
          ring.position.copy(pos); ring.raycast=()=>{};
          proxy.position.copy(pos); proxy.userData={isGizmo:true,arrowIdx:ai,axisName};
          scene3d.add(ring); scene3d.add(proxy);
          const HOVER_MAP={0xff3333:0xff8888,0x33cc33:0x77ee77,0x3399ff:0x77bbff};
          axisArrows.push({_visuals:[ring],_proxies:[proxy],_col:col,_hoverCol:HOVER_MAP[col]||0x888888,
            setColor(c){visMat.color.setHex(c);}});
        });
      }
    }
  }
  rebuildMeshes();

  // ── Snapshot / Undo / Redo / Copy / Paste / Delete ───────────────────────────
  function snapshotShapes(){
    return shapes.map(s=>{
      const snap={...s};
      if(s.customPositions) snap.customPositions=new Float32Array(s.customPositions);
      return snap;
    });
  }
  function pushUndo(){
    _undoStack.push(snapshotShapes());
    if(_undoStack.length>50) _undoStack.shift();
    _redoStack=[]; updateEditBtns();
  }
  function undoOp(){
    if(!_undoStack.length) return;
    _redoStack.push(snapshotShapes());
    const snap=_undoStack.pop();
    shapes=snap.map(s=>{const r={...s};if(s.customPositions)r.customPositions=new Float32Array(s.customPositions);return r;});
    if(selectedIdx!==null&&selectedIdx>=shapes.length)
      selectedIdx=shapes.length?shapes.length-1:null;
    _gizmoMode='translate';
    rebuildMeshes(); renderProps(); updateEditBtns();
  }
  function redoOp(){
    if(!_redoStack.length) return;
    _undoStack.push(snapshotShapes());
    const snap=_redoStack.pop();
    shapes=snap.map(s=>{const r={...s};if(s.customPositions)r.customPositions=new Float32Array(s.customPositions);return r;});
    if(selectedIdx!==null&&selectedIdx>=shapes.length)
      selectedIdx=shapes.length?shapes.length-1:null;
    _gizmoMode='translate';
    rebuildMeshes(); renderProps(); updateEditBtns();
  }
  function deleteSelected(){
    if(selectedIdx===null) return;
    pushUndo();
    shapes.splice(selectedIdx,1);
    selectedIdx=shapes.length?Math.min(selectedIdx,shapes.length-1):null;
    _gizmoMode='translate';
    rebuildMeshes(); renderProps();
    logUsage('model_shape_delete',{id:item.id,shapeCount:shapes.length});
  }
  function copySelected(){
    if(selectedIdx===null) return;
    const s=shapes[selectedIdx];
    _clipboard={...s};
    if(s.customPositions) _clipboard.customPositions=new Float32Array(s.customPositions);
    updateEditBtns();
  }
  function pasteSelected(){
    if(!_clipboard) return;
    pushUndo();
    const pasted={..._clipboard};
    if(_clipboard.customPositions) pasted.customPositions=new Float32Array(_clipboard.customPositions);
    pasted.x=(_clipboard.x||0)+0.4;
    pasted.z=(_clipboard.z||0)+0.4;
    shapes.push(pasted);
    selectedIdx=shapes.length-1;
    _gizmoMode='translate';
    rebuildMeshes(); renderProps(); updateEditBtns();
    logUsage('model_shape_paste',{id:item.id,shapeCount:shapes.length});
  }
  function updateEditBtns(){
    const bu=document.getElementById('btn3d-undo');
    const br=document.getElementById('btn3d-redo');
    const bd=document.getElementById('btn3d-delete');
    const bc=document.getElementById('btn3d-copy');
    const bp=document.getElementById('btn3d-paste');
    if(bu) bu.disabled=!_undoStack.length;
    if(br) br.disabled=!_redoStack.length;
    if(bd) bd.disabled=selectedIdx===null;
    if(bc) bc.disabled=selectedIdx===null;
    if(bp) bp.disabled=!_clipboard;
  }
  function onKeyDown3d(e){
    const tag=e.target.tagName;
    if(tag==='INPUT'||tag==='TEXTAREA'||e.target.contentEditable==='true') return;
    if((e.ctrlKey||e.metaKey)&&!e.shiftKey&&e.key==='z'){e.preventDefault();undoOp();}
    else if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='z'))){e.preventDefault();redoOp();}
    else if((e.ctrlKey||e.metaKey)&&e.key==='c'){e.preventDefault();copySelected();}
    else if((e.ctrlKey||e.metaKey)&&e.key==='v'){e.preventDefault();pasteSelected();}
    else if(e.key==='Delete'||e.key==='Backspace'){e.preventDefault();deleteSelected();}
  }
  window.addEventListener('keydown',onKeyDown3d);

  // ── Properties panel ─────────────────────────────────────────────────────────
  function setField(id, val){
    const num  = document.getElementById(id);
    const disp = document.getElementById(id+'-display');
    const v = parseFloat(val.toFixed(2));
    if(num)  num.value = v;
    if(disp) disp.textContent = v;
  }
  function renderProps(){
    const empty  = document.getElementById('editor3d-empty-props');
    const fields = document.getElementById('editor3d-prop-fields');
    if(selectedIdx===null || selectedIdx>=shapes.length){
      empty.style.display=''; fields.style.display='none'; return;
    }
    empty.style.display='none'; fields.style.display='';
    const s = shapes[selectedIdx];
    setField('prop-rx', s.rx||0);
    setField('prop-ry', s.ry||0);
    setField('prop-rz', s.rz||0);
    setField('prop-px', s.x||0);
    setField('prop-py', s.y||0);
    setField('prop-pz', s.z||0);
    setField('prop-sx', dimX(s));
    setField('prop-sy', dimY(s));
    setField('prop-sz', dimZ(s));
    const SWATCH_COLORS = [
      '#cc2222','#22882a','#2255cc','#cc6600','#7722bb','#ccaa00','#444444',
      '#ff8888','#88dd88','#88aaff','#ffaa55','#cc88ff','#ffee66','#cccccc'
    ];
    const swatchWrap = document.getElementById('prop-swatches');
    if(swatchWrap){
      swatchWrap.innerHTML = '';
      SWATCH_COLORS.forEach(hex=>{
        const sw = document.createElement('div');
        sw.className = 'prop-swatch' + (s.color===hex?' active':'');
        sw.style.background = hex;
        sw.title = hex;
        sw.addEventListener('click',()=>{
          if(selectedIdx===null) return;
          pushUndo();
          shapes[selectedIdx].color = hex;
          logUsage('model_property_change',{id:item.id, shapeIdx:selectedIdx, property:'color', value:hex});
          rebuildMeshes();
          swatchWrap.querySelectorAll('.prop-swatch').forEach(el=>
            el.classList.toggle('active', el.title===hex));
        });
        swatchWrap.appendChild(sw);
      });
    }
  }

  const _propLogTimers = {};
  function bindProp(id, key){
    const num  = document.getElementById(id);
    const disp = document.getElementById(id+'-display');
    let _changed = false;
    function apply(val){
      if(selectedIdx===null) return;
      if(!_changed){
        _undoStack.push(snapshotShapes());
        if(_undoStack.length>50) _undoStack.shift();
        _redoStack=[]; _changed=true; updateEditBtns();
      }
      const v = parseFloat(val)||0;
      shapes[selectedIdx][key] = v;
      if(num)  num.value        = v;
      if(disp) disp.textContent = v.toFixed(2);
      rebuildMeshes();
      clearTimeout(_propLogTimers[key]);
      _propLogTimers[key] = setTimeout(()=>{
        if(selectedIdx===null) return;
        logUsage('model_property_change',{id:item.id, shapeIdx:selectedIdx, property:key, value:v});
      }, 600);
    }
    if(num){
      num.addEventListener('focus', ()=>{ _changed=false; });
      num.addEventListener('input', ()=>apply(num.value));
    }
  }
  bindProp('prop-rx','rx'); bindProp('prop-ry','ry'); bindProp('prop-rz','rz');
  bindProp('prop-px','x');  bindProp('prop-py','y');  bindProp('prop-pz','z');
  bindProp('prop-sx','sx'); bindProp('prop-sy','sy'); bindProp('prop-sz','sz');

  // ── Shape add buttons ────────────────────────────────────────────────────────
  document.getElementById('add-box').addEventListener('click',()=>{
    pushUndo();
    shapes.push({kind:'box', x:-0.5, y:0, z:-0.5, sx:1, sy:1, sz:1, color:'#2255cc'});
    selectedIdx = shapes.length-1; _gizmoMode='translate';
    logUsage('model_shape_add',{id:item.id, kind:'box', shapeCount:shapes.length});
    rebuildMeshes(); renderProps();
  });
  document.getElementById('add-sphere').addEventListener('click',()=>{
    pushUndo();
    shapes.push({kind:'sphere', x:-0.5, y:0, z:-0.5, sx:1, sy:1, sz:1, color:'#cc2222'});
    selectedIdx = shapes.length-1; _gizmoMode='translate';
    logUsage('model_shape_add',{id:item.id, kind:'sphere', shapeCount:shapes.length});
    rebuildMeshes(); renderProps();
  });
  document.getElementById('add-cylinder').addEventListener('click',()=>{
    pushUndo();
    shapes.push({kind:'cylinder', x:-0.5, y:0, z:-0.5, sx:1, sy:1, sz:1, color:'#22882a'});
    selectedIdx = shapes.length-1; _gizmoMode='translate';
    logUsage('model_shape_add',{id:item.id, kind:'cylinder', shapeCount:shapes.length});
    rebuildMeshes(); renderProps();
  });
  ['add-pyramid','add-prism','add-cone'].forEach(id=>{
    document.getElementById(id).addEventListener('click',()=>toast('Coming soon'));
  });
  document.getElementById('btn3d-undo').addEventListener('click', undoOp);
  document.getElementById('btn3d-redo').addEventListener('click', redoOp);
  document.getElementById('btn3d-delete').addEventListener('click', deleteSelected);
  document.getElementById('btn3d-copy').addEventListener('click', copySelected);
  document.getElementById('btn3d-paste').addEventListener('click', pasteSelected);
  updateEditBtns();

  // ── Interaction ──────────────────────────────────────────────────────────────
  const raycaster = new THREE.Raycaster();
  let _gizmoDrag    = null;
  let _scaleDrag    = null;
  let _meshDrag     = null;
  let _hoveredArrow = null;
  let _mouseDownPos = null;
  let _lastTouch    = null;

  const ARROW_COLORS = [0x111111, 0x33cc33, 0x3399ff];
  const ARROW_HOVER  = [0x555555, 0x77ee77, 0x77bbff];

  function getArrowMeshes(){
    const result = [];
    axisArrows.forEach(g=>{ (g._proxies||[]).forEach(p=>result.push(p)); });
    return result;
  }
  function getScaleProxies(){
    return scaleHandles.filter(h=>h._proxy).map(h=>h._proxy);
  }
  function setArrowHover(arrowIdx){
    if(_hoveredArrow !== null && _hoveredArrow !== arrowIdx){
      const a = axisArrows[_hoveredArrow];
      if(a) a.setColor(a._col);
      _hoveredArrow = null;
    }
    if(arrowIdx !== null){
      const a = axisArrows[arrowIdx];
      if(a){ a.setColor(a._hoverCol); _hoveredArrow = arrowIdx; }
    }
  }
  function getScreenAxis(axisName){
    const AXES = {x:new THREE.Vector3(1,0,0), y:new THREE.Vector3(0,1,0), z:new THREE.Vector3(0,0,1)};
    const dir = AXES[axisName];
    const s = shapes[selectedIdx];
    const objWorld = new THREE.Vector3((s.x||0)+dimX(s)*0.5, (s.y||0)+dimY(s)*0.5, (s.z||0)+dimZ(s)*0.5);
    const p0 = objWorld.clone().project(camera3d);
    const p1 = objWorld.clone().addScaledVector(dir, 1).project(camera3d);
    const sx = p1.x - p0.x;
    const sy = p1.y - p0.y;
    if(Math.abs(sx) >= Math.abs(sy)){
      return { screenAxis: 'x', sign: sx >= 0 ? 1 : -1 };
    } else {
      return { screenAxis: 'y', sign: sy >= 0 ? -1 : 1 };
    }
  }
  function getDragSensitivity(){
    if(selectedIdx === null) return 0.01;
    const s = shapes[selectedIdx];
    const objPos = new THREE.Vector3((s.x||0)+dimX(s)*0.5, (s.y||0)+dimY(s)*0.5, (s.z||0)+dimZ(s)*0.5);
    return camera3d.position.distanceTo(objPos) * 0.001;
  }

  function getNDC(clientX,clientY){
    const rect=renderer3d.domElement.getBoundingClientRect();
    return new THREE.Vector2(
      ((clientX-rect.left)/rect.width)*2-1,
      -((clientY-rect.top)/rect.height)*2+1);
  }

  // Shared by mouse (mousedown) and touch (touchstart): hit-tests scale handles, gizmo
  // arrows/rings, then the mesh body itself, and sets up whichever drag state applies.
  // Returns true if something was grabbed (caller should stop the event from propagating).
  function startPointerDrag(clientX, clientY){
    if(selectedIdx === null) return false;
    raycaster.setFromCamera(getNDC(clientX,clientY), camera3d);

    const scaleHits = raycaster.intersectObjects(getScaleProxies(), false);
    if(scaleHits.length){
      const ud=scaleHits[0].object.userData, s=shapes[selectedIdx];
      if(ud.isHeightHandle){
        const camDir=new THREE.Vector3();
        camera3d.getWorldDirection(camDir); camDir.y=0; camDir.normalize();
        const dragPlane=new THREE.Plane(camDir,
          -camDir.dot(new THREE.Vector3((s.x||0)+dimX(s)*0.5,ud.startTopY,(s.z||0)+dimZ(s)*0.5)));
        const startPt=new THREE.Vector3();
        raycaster.ray.intersectPlane(dragPlane,startPt);
        _scaleDrag={kind:'height', dragPlane, startPt:startPt.clone(),
          startMinObjY:getMinObjY(s), startMaxObjY:getMaxObjY(s)};
        const _hm=meshes.find(m=>m.userData.shapeIdx===selectedIdx&&m.type==='Mesh');
        if(_hm){_hm.updateWorldMatrix(true,false);_scaleDrag.origPositions=new Float32Array(_hm.geometry.attributes.position.array);}
      } else {
        // The corner handles sit at bottomY = getMinObjY(s), which for a box tilted around
        // X/Z is BELOW s.y (the box's nominal, untilted floor). A drag plane at s.y would
        // intersect the mouse ray far from where the handle actually is (parallax), so the
        // plane must pass through the handles' true height.
        const dragPlane=new THREE.Plane(new THREE.Vector3(0,1,0),-getMinObjY(s));
        const startAABB=getFootprintAABB(s);
        const _cSP=new THREE.Vector3(); raycaster.ray.intersectPlane(dragPlane,_cSP);
        // The proxy's own position is the handle's exact corner — the actual click point
        // (anywhere inside the generous hit-box) is almost never exactly on it. Track the
        // offset so the drag is relative to the click, not an absolute snap to it.
        const _cornerPos=scaleHits[0].object.position;
        _scaleDrag={kind:'corner', anchorX:ud.anchorX, anchorZ:ud.anchorZ,
          dragPlane,
          startAABBW:Math.max(0.001,startAABB.x1-startAABB.x0),
          startAABBD:Math.max(0.001,startAABB.z1-startAABB.z0),
          sideX:_cornerPos.x<ud.anchorX?-1:1, sideZ:_cornerPos.z<ud.anchorZ?-1:1,
          offsetX:_cornerPos.x-_cSP.x, offsetZ:_cornerPos.z-_cSP.z};
        const _cm=meshes.find(m=>m.userData.shapeIdx===selectedIdx&&m.type==='Mesh');
        if(_cm){_cm.updateWorldMatrix(true,false);_scaleDrag.origPositions=new Float32Array(_cm.geometry.attributes.position.array);}
      }
      controls3d.enabled=false;
      renderer3d.domElement.style.cursor='grabbing';
      return true;
    }

    const arrowHits=raycaster.intersectObjects(getArrowMeshes(),false);
    if(!arrowHits.length){
      const meshHits=raycaster.intersectObjects(meshes,false);
      if(meshHits.length && meshHits[0].object.userData.shapeIdx===selectedIdx){
        const s=shapes[selectedIdx];
        const dragPlane=new THREE.Plane(new THREE.Vector3(0,1,0),-(s.y||0));
        const startPt=new THREE.Vector3();
        raycaster.ray.intersectPlane(dragPlane,startPt);
        _meshDrag={dragPlane, offsetX:startPt.x-(s.x||0), offsetZ:startPt.z-(s.z||0)};
        controls3d.enabled=false;
        renderer3d.domElement.style.cursor='grabbing';
        return true;
      }
      return false;
    }
    const aName=arrowHits[0].object.userData.axisName;
    let shapeProp=aName;
    if(_gizmoMode==='rotate') shapeProp='r'+aName;
    let screenAxis,sign;
    if(_gizmoMode==='rotate'){
      screenAxis='x'; sign=1;
    } else { ({screenAxis,sign}=getScreenAxis(aName)); }
    const sensitivity=_gizmoMode==='rotate'?0.4:getDragSensitivity();
    _gizmoDrag={axisName:aName,shapeProp,screenAxis,sign,
      startVal:shapes[selectedIdx][shapeProp]||0,
      accumulated:0,sensitivity,minVal:-Infinity};
    if(_gizmoMode==='rotate'){
      const WORLD_AXES={x:new THREE.Vector3(1,0,0),y:new THREE.Vector3(0,1,0),z:new THREE.Vector3(0,0,1)};
      const srcMesh=meshes.find(m=>m.userData.shapeIdx===selectedIdx);
      _gizmoDrag.worldAxis=WORLD_AXES[aName];
      _gizmoDrag.startQuaternion=srcMesh?srcMesh.quaternion.clone():new THREE.Quaternion();
    }
    controls3d.enabled=false;
    renderer3d.domElement.style.cursor='grabbing';
    return true;
  }

  renderer3d.domElement.addEventListener('mousedown', e=>{
    if(e.button !== 0) return;
    _mouseDownPos = {x: e.clientX, y: e.clientY};
    if(startPointerDrag(e.clientX, e.clientY)) e.stopPropagation();
  });

  renderer3d.domElement.addEventListener('mousemove', e=>{
    if(!_gizmoDrag && !_scaleDrag && selectedIdx !== null){
      const rect = renderer3d.domElement.getBoundingClientRect();
      const ndc = new THREE.Vector2(
        ((e.clientX-rect.left)/rect.width)*2-1,
        -((e.clientY-rect.top)/rect.height)*2+1
      );
      raycaster.setFromCamera(ndc, camera3d);
      const arrowHits = raycaster.intersectObjects(getArrowMeshes(), false);
      const scHits    = raycaster.intersectObjects(getScaleProxies(), false);
      if(arrowHits.length){
        setArrowHover(arrowHits[0].object.userData.arrowIdx);
        renderer3d.domElement.style.cursor = 'grab';
      } else if(scHits.length){
        setArrowHover(null);
        renderer3d.domElement.style.cursor = 'grab';
      } else {
        setArrowHover(null);
        renderer3d.domElement.style.cursor = '';
      }
    }
  });

  function updatePropField(id,val){
    const n=document.getElementById(id),d=document.getElementById(id+'-display');
    if(n) n.value=val; if(d) d.textContent=val;
  }

  // Shared by mouse (mousemove) and touch (touchmove): advances whichever drag is
  // currently active. movX/movY are the screen-pixel delta since the last move event,
  // used only by the gizmo arrow/ring drag (mouse supplies it via e.movementX/Y; touch
  // computes it from consecutive touch positions since touch events lack that field).
  function processPointerMove(clientX, clientY, movX, movY){
    if(selectedIdx===null) return;
    if((_meshDrag||_scaleDrag||_gizmoDrag)&&!_dragUndoPushed){
      _undoStack.push(snapshotShapes());
      if(_undoStack.length>50) _undoStack.shift();
      _redoStack=[]; _dragUndoPushed=true; updateEditBtns();
    }
    if(_meshDrag){
      raycaster.setFromCamera(getNDC(clientX,clientY),camera3d);
      const curPt=new THREE.Vector3();
      if(!raycaster.ray.intersectPlane(_meshDrag.dragPlane,curPt)) return;
      const s=shapes[selectedIdx];
      s.x=parseFloat((curPt.x-_meshDrag.offsetX).toFixed(3));
      s.z=parseFloat((curPt.z-_meshDrag.offsetZ).toFixed(3));
      updatePropField('prop-px',s.x); updatePropField('prop-pz',s.z);
      rebuildMeshes(); return;
    }
    if(_scaleDrag){
      raycaster.setFromCamera(getNDC(clientX,clientY),camera3d);
      // A ray nearly parallel to the drag plane makes the intersection numerically
      // unstable (tiny mouse/camera changes swing the result wildly) — skip such
      // frames instead of applying a wild point, which is what causes handles to jump.
      if(Math.abs(raycaster.ray.direction.dot(_scaleDrag.dragPlane.normal))<0.08) return;
      const curPt=new THREE.Vector3();
      if(!raycaster.ray.intersectPlane(_scaleDrag.dragPlane,curPt)) return;
      const s=shapes[selectedIdx];
      if(_scaleDrag.kind==='height'){
        if(_scaleDrag.origPositions){
          const targetMaxObjY=_scaleDrag.startMaxObjY+(curPt.y-_scaleDrag.startPt.y);
          applyHeightDeform(s,_scaleDrag.startMinObjY,_scaleDrag.startMaxObjY,targetMaxObjY,_scaleDrag.origPositions);
          updatePropField('prop-sy',parseFloat((s.customYMax-s.customYMin).toFixed(2)));
        }
      } else if(_scaleDrag.origPositions){
        const ax=_scaleDrag.anchorX, az=_scaleDrag.anchorZ;
        const MIN_AABB=0.15;
        const dragX=curPt.x+_scaleDrag.offsetX, dragZ=curPt.z+_scaleDrag.offsetZ;
        const cx2=_scaleDrag.sideX<0?Math.min(dragX,ax-MIN_AABB):Math.max(dragX,ax+MIN_AABB);
        const cz2=_scaleDrag.sideZ<0?Math.min(dragZ,az-MIN_AABB):Math.max(dragZ,az+MIN_AABB);
        const newAABBW=Math.abs(cx2-ax), newAABBD=Math.abs(cz2-az);
        const scaleX=newAABBW/_scaleDrag.startAABBW, scaleZ=newAABBD/_scaleDrag.startAABBD;
        applyFootprintDeform(s,ax,az,scaleX,scaleZ,_scaleDrag.origPositions);
        updatePropField('prop-sx',parseFloat(newAABBW.toFixed(2)));
        updatePropField('prop-sz',parseFloat(newAABBD.toFixed(2)));
      }
      rebuildMeshes(); return;
    }
    if(!_gizmoDrag) return;
    const pixelDelta=_gizmoMode==='rotate'?(movX-movY):(_gizmoDrag.screenAxis==='x'?movX:movY);
    _gizmoDrag.accumulated+=pixelDelta;
    const worldDelta=_gizmoDrag.accumulated*_gizmoDrag.sensitivity*_gizmoDrag.sign;
    if(_gizmoMode==='rotate'&&_gizmoDrag.worldAxis){
      const totalRad=worldDelta*Math.PI/180;
      const rotQ=new THREE.Quaternion().setFromAxisAngle(_gizmoDrag.worldAxis,totalRad);
      const resultQ=rotQ.multiply(_gizmoDrag.startQuaternion.clone());
      const euler=new THREE.Euler().setFromQuaternion(resultQ,'ZYX');
      const s=shapes[selectedIdx];
      s.rx=parseFloat((euler.x*180/Math.PI).toFixed(2));
      s.ry=parseFloat((euler.y*180/Math.PI).toFixed(2));
      s.rz=parseFloat((euler.z*180/Math.PI).toFixed(2));
      rebuildMeshes();
      updatePropField('prop-rx',s.rx);
      updatePropField('prop-ry',s.ry);
      updatePropField('prop-rz',s.rz);
    } else {
      let newVal=parseFloat((_gizmoDrag.startVal+worldDelta).toFixed(2));
      if(_gizmoDrag.minVal>-Infinity) newVal=Math.max(_gizmoDrag.minVal,newVal);
      shapes[selectedIdx][_gizmoDrag.shapeProp]=newVal;
      rebuildMeshes();
      updatePropField('prop-p'+_gizmoDrag.axisName,newVal);
    }
  }

  window.addEventListener('mousemove', e=>{
    processPointerMove(e.clientX, e.clientY, e.movementX, e.movementY);
  });

  // Shared by mouse (mouseup) and touch (touchend): releases whichever drag is active,
  // baking + persisting changes as needed. Returns true only when a mesh-body drag was
  // released after actually moving (the one case that should skip click/tap handling —
  // scale/gizmo releases intentionally fall through, since the click-detection below
  // re-checks for arrow/scale-proxy hits and bails on those itself).
  function endPointerDrag(clientX, clientY, downPos){
    let skipClick = false;
    if(_meshDrag){
      const mdx=downPos?clientX-downPos.x:99;
      const mdy=downPos?clientY-downPos.y:99;
      const wasDrag=Math.hypot(mdx,mdy)>5;
      if(wasDrag && selectedIdx!==null)
        logUsage('model_property_change',{id:item.id,shapeIdx:selectedIdx,
          property:'x+z',value:{x:shapes[selectedIdx].x,z:shapes[selectedIdx].z},via:'mesh_drag'});
      _meshDrag=null; _dragUndoPushed=false; controls3d.enabled=true; renderer3d.domElement.style.cursor='';
      if(wasDrag) skipClick = true;
    }
    if(_scaleDrag){
      if(selectedIdx!==null){
        if(_scaleDrag.kind==='height') bakeHeightDeform(shapes[selectedIdx]);
        if(_scaleDrag.kind==='corner') bakeFootprintDeform(shapes[selectedIdx]);
        // Baking mutates s.customPositions/s.sy/s.y but the rendered mesh geometry buffer
        // isn't touched until the next rebuild. The next drag's mousedown snapshots
        // origPositions straight from that mesh buffer, so without this rebuild here it
        // would be stale relative to the just-baked pivot — causing a frozen Y-offset on
        // every frame of the very next drag.
        rebuildMeshes();
        logUsage('model_property_change',{id:item.id,shapeIdx:selectedIdx,via:'scale_corner_drag'});
      }
      _scaleDrag=null; _dragUndoPushed=false; controls3d.enabled=true; renderer3d.domElement.style.cursor='';
    }
    if(_gizmoDrag){
      if(selectedIdx !== null){
        logUsage('model_property_change',{
          id:item.id, shapeIdx:selectedIdx,
          property:_gizmoDrag.shapeProp,
          value:shapes[selectedIdx][_gizmoDrag.shapeProp],
          via:'gizmo_drag'
        });
      }
      _gizmoDrag = null; _dragUndoPushed = false;
      setArrowHover(null);
      controls3d.enabled = true;
      renderer3d.domElement.style.cursor = '';
    }
    return skipClick;
  }

  // Shared by mouse (mouseup) and touch (touchend): a click/tap that wasn't a drag —
  // select a shape, toggle gizmo translate/rotate mode on the already-selected one, or
  // deselect when clicking empty space.
  function handlePointerClick(clientX, clientY){
    raycaster.setFromCamera(getNDC(clientX,clientY), camera3d);
    const arrowHits = raycaster.intersectObjects(getArrowMeshes(), false);
    const sHits     = raycaster.intersectObjects(getScaleProxies(), false);
    if(arrowHits.length || sHits.length) return;

    const hits = raycaster.intersectObjects(meshes);
    if(hits.length){
      const hitIdx = hits[0].object.userData.shapeIdx;
      if(hitIdx === selectedIdx){
        if(_gizmoMode==='translate'){
          bakeHeightDeform(shapes[selectedIdx]);
          bakeFootprintDeform(shapes[selectedIdx]);
        }
        _gizmoMode = _gizmoMode === 'translate' ? 'rotate' : 'translate';
        logUsage('model_gizmo_mode_toggle',{id:item.id, shapeIdx:selectedIdx, mode:_gizmoMode});
      } else {
        selectedIdx = hitIdx;
        _gizmoMode = 'translate';
        logUsage('model_shape_select',{id:item.id, shapeIdx:selectedIdx, kind:shapes[selectedIdx]?.kind, via:'click'});
      }
    } else {
      selectedIdx = null;
      _gizmoMode = 'translate';
    }
    rebuildMeshes(); renderProps(); updateEditBtns();
  }

  window.addEventListener('mouseup', e=>{
    if(endPointerDrag(e.clientX, e.clientY, _mouseDownPos)){
      _mouseDownPos = null;
      return;
    }
    if(!_mouseDownPos) return;
    const dx = e.clientX - _mouseDownPos.x;
    const dy = e.clientY - _mouseDownPos.y;
    _mouseDownPos = null;
    if(Math.hypot(dx, dy) > 5) return;
    handlePointerClick(e.clientX, e.clientY);
  });

  // ── Touch support ────────────────────────────────────────────────────────────
  renderer3d.domElement.addEventListener('touchstart',e=>{
    if(e.touches.length!==1) return;
    const t=e.touches[0];
    _mouseDownPos={x:t.clientX,y:t.clientY};
    _lastTouch={x:t.clientX,y:t.clientY};
    if(startPointerDrag(t.clientX, t.clientY)){ e.preventDefault(); e.stopPropagation(); }
  },{passive:false});

  window.addEventListener('touchmove',e=>{
    if(e.touches.length!==1) return;
    if(!_meshDrag&&!_scaleDrag&&!_gizmoDrag) return;
    e.preventDefault();
    const t=e.touches[0];
    const movX=_lastTouch?t.clientX-_lastTouch.x:0;
    const movY=_lastTouch?t.clientY-_lastTouch.y:0;
    _lastTouch={x:t.clientX,y:t.clientY};
    processPointerMove(t.clientX, t.clientY, movX, movY);
  },{passive:false});

  window.addEventListener('touchend',e=>{
    const t=e.changedTouches[0];
    if(endPointerDrag(t.clientX, t.clientY, _mouseDownPos)){
      _mouseDownPos=null; _lastTouch=null;
      return;
    }
    _lastTouch=null;
    if(!_mouseDownPos) return;
    const dx=t.clientX-_mouseDownPos.x,dy=t.clientY-_mouseDownPos.y;
    _mouseDownPos=null;
    if(Math.hypot(dx,dy)>5) return;
    handlePointerClick(t.clientX, t.clientY);
  });

  // ── Render loop ──────────────────────────────────────────────────────────────
  let animRunning = true;
  function animate3d(){
    if(!animRunning) return;
    requestAnimationFrame(animate3d);
    // OrbitControls.update() keeps decaying damping inertia even while .enabled is
    // false, so any residual orbit/pan momentum from right before a handle-drag starts
    // would otherwise keep nudging the camera (and with it, every gizmo) for a few
    // frames. Skipping update() while disabled freezes the camera the instant a drag begins.
    if(controls3d.enabled) controls3d.update();
    renderer3d.render(scene3d, camera3d);
  }
  animate3d();

  function teardown3d(){
    animRunning = false;
    resizeObserver3d.disconnect();
    window.removeEventListener('keydown', onKeyDown3d);
    clearArrows();
    clearScaleHandles();
    controls3d.dispose();
    renderer3d.dispose();
    meshes.forEach(m=>{ m.geometry.dispose(); m.material.dispose(); });
    scene3d.clear();
  }

  renderProps();
  document.getElementById('save-model').addEventListener('click', doSave);
  document.getElementById('discard-model').addEventListener('click', doDiscard);
  const _modelOpenedAt = Date.now();
  logUsage('model_editor_open',{id:item.id, existingShapeCount:item.shapes?item.shapes.length:0});
}
</script>
</body>
</html>
