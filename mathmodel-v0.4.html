<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MathModel – Modelling Workspace</title>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F7F5F0; --surface:#FFFFFF; --surface2:#F0EDE6;
  --border:#D8D4CB; --border-soft:#E8E4DC;
  --text:#1A1814; --text2:#6B6760; --text3:#9E9B95;
  --accent:#2D5A8E; --accent-light:#E8EFF8;
  --accent2:#B85C1A; --accent2-light:#FAF0E8;
  --accent3:#2A7A4B; --accent3-light:#E8F5EE;
  --red:#B83232; --red-light:#FBE8E8;
  --canvas-dot:#D0CCC4;
  --shadow:0 2px 8px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12),0 2px 8px rgba(0,0,0,.06);
  --shadow-xl:0 20px 60px rgba(0,0,0,.18),0 4px 16px rgba(0,0,0,.08);
  --r:10px;
  --lib-h:130px;
  --font-serif:'DM Serif Display',Georgia,serif;
  --font-sans:'Instrument Sans',system-ui,sans-serif;
  --font-mono:'DM Mono',monospace;
}
body{font-family:var(--font-sans);background:var(--bg);color:var(--text);
  height:100vh;overflow:hidden;user-select:none}

/* â”€â”€ TOPBAR â”€â”€ */
#topbar{
  position:fixed;top:0;left:0;right:0;height:52px;z-index:200;
  background:var(--surface);border-bottom:1px solid var(--border-soft);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
}
.brand{display:flex;align-items:center;gap:10px}
.brand-mark{width:30px;height:30px;background:var(--text);border-radius:6px;
  display:flex;align-items:center;justify-content:center;}
.brand-name{font-family:var(--font-serif);font-size:18px;letter-spacing:-.02em}
.brand-name span{color:var(--accent)}
.topbar-actions{display:flex;align-items:center;gap:8px}
.btn{display:flex;align-items:center;gap:6px;padding:7px 14px;border-radius:7px;
  font-size:13px;font-weight:500;font-family:var(--font-sans);cursor:pointer;
  transition:all .15s;border:1px solid transparent;}
.btn-ghost{background:transparent;color:var(--text2);border-color:var(--border-soft)}
.btn-ghost:hover{background:var(--surface2);color:var(--text);border-color:var(--border)}
.btn-primary{background:var(--text);color:#fff;border-color:var(--text)}
.btn-primary:hover{background:#333}
.btn-danger-soft{color:var(--red)!important;border-color:var(--red-light)!important}
.btn-danger-soft:hover{background:var(--red-light)!important}
.divider-v{width:1px;height:24px;background:var(--border-soft);margin:0 4px}

/* â”€â”€ CANVAS AREA â”€â”€ */
#canvas-wrap{
  position:fixed;top:52px;left:0;right:0;
  bottom:var(--lib-h);cursor:grab;overflow:hidden;
}
#canvas-wrap.grabbing{cursor:grabbing}
#canvas{position:absolute;transform-origin:0 0}
#canvas-wrap::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background-image:radial-gradient(circle,var(--canvas-dot) 1px,transparent 1px);
  background-size:28px 28px;
}
#grid{position:relative}

/* â”€â”€ CELL WRAPPER â”€â”€ */
.cell-wrapper{position:absolute}
.add-btn{
  position:absolute;width:28px;height:28px;border-radius:6px;
  background:var(--surface);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;z-index:10;padding:0;box-shadow:var(--shadow);
  transition:opacity .15s,background .15s,border-color .15s;
}
.add-btn svg{stroke:var(--text2)}
.add-btn:hover{background:var(--accent);border-color:var(--accent);box-shadow:var(--shadow-lg)}
.add-btn:hover svg{stroke:#fff}
.cell-wrapper:hover .add-btn{opacity:1}
.add-top   {top:-20px;   left:50%;transform:translate(-50%,-50%)}
.add-bottom{bottom:-20px;left:50%;transform:translate(-50%,50%)}
.add-left  {left:-20px;  top:50%; transform:translate(-50%,-50%)}
.add-right {right:-20px; top:50%; transform:translate(50%,-50%)}

/* â”€â”€ CARD â”€â”€ */
.card{
  width:240px;height:200px;background:var(--surface);
  border:1.5px solid var(--border-soft);border-radius:var(--r);
  box-shadow:var(--shadow);display:flex;flex-direction:column;
  overflow:hidden;transition:border-color .15s,box-shadow .15s;
  cursor:pointer;
}
.card:hover{border-color:var(--border);box-shadow:var(--shadow-lg)}
.card.selected{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-light),var(--shadow-lg)}
.card.has-text  {border-top:3px solid var(--accent)}
.card.has-sketch{border-top:3px solid var(--accent2)}
.card.has-voice {border-top:3px solid var(--accent3)}
.card.empty{border-style:dashed;border-color:var(--border);box-shadow:none}
.card.empty:hover{border-color:var(--accent);background:var(--accent-light)}
.card.drop-target{
  border-color:var(--accent)!important;border-style:solid!important;
  box-shadow:0 0 0 3px var(--accent-light),var(--shadow-lg)!important;
  background:var(--accent-light)!important;
}
.cell-wrapper.dragging-card{opacity:.3;pointer-events:none}

/* card header */
.card-header{
  padding:7px 8px 6px;border-bottom:1px solid var(--border-soft);
  display:flex;align-items:center;gap:6px;flex-shrink:0;
}
.type-dot{flex-shrink:0;width:7px;height:7px;border-radius:50%}
.dot-text  {background:var(--accent)}
.dot-sketch{background:var(--accent2)}
.dot-voice {background:var(--accent3)}
.card-title-input{
  flex:1;min-width:0;font-size:12px;font-weight:600;font-family:var(--font-sans);
  color:var(--text);background:transparent;border:none;outline:none;
  padding:1px 3px;border-radius:4px;cursor:text;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  transition:background .1s,box-shadow .1s;
}
.card-title-input::placeholder{color:var(--text3);font-weight:400;font-style:italic}
.card-title-input:focus{background:var(--surface2);box-shadow:0 0 0 1.5px var(--accent)}
.card-actions{display:flex;gap:2px;flex-shrink:0}
.card-action-btn{
  width:22px;height:22px;border-radius:5px;border:none;background:transparent;
  cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .1s;
}
.card-action-btn:hover{background:var(--surface2)}
.card-action-btn.del:hover{background:var(--red-light)}
.card-action-btn.del:hover svg{stroke:var(--red)!important}

/* card body */
.card-body{flex:1;padding:10px;overflow:hidden;display:flex;flex-direction:column}
.card-body.center{align-items:center;justify-content:center;gap:10px}
.card-text-content{
  flex:1;font-size:13px;line-height:1.6;color:var(--text);
  word-break:break-word;overflow:hidden;font-family:var(--font-sans);
}
.card-text-content b,.card-text-content strong{font-weight:700}
.card-text-content i,.card-text-content em{font-style:italic}
.card-text-content.empty-preview{color:var(--text3);font-style:italic}
.card-sketch-preview{flex:1;width:100%;border-radius:6px;overflow:hidden;background:var(--bg)}
.card-sketch-preview canvas{width:100%;height:100%;display:block}
.card-voice-preview{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:8px;
}
.card-voice-preview audio{width:100%;height:32px;outline:none}
.card-voice-label{font-size:11px;color:var(--text3);display:flex;align-items:center;gap:4px}

/* add-from-library button inside empty card */
.add-from-lib-btn{
  display:flex;align-items:center;gap:7px;
  padding:8px 14px;border-radius:8px;
  border:1.5px solid var(--border-soft);background:var(--surface2);
  font-size:12px;font-weight:600;font-family:var(--font-sans);
  color:var(--text2);cursor:pointer;transition:all .15s;
}
.add-from-lib-btn:hover{
  background:var(--accent-light);border-color:var(--accent);color:var(--accent)
}
.add-from-lib-btn:hover svg{stroke:var(--accent)}

/* â”€â”€ MEDIA LIBRARY â”€â”€ */
#library{
  position:fixed;bottom:0;left:0;right:0;height:var(--lib-h);z-index:300;
  background:var(--surface);border-top:1.5px solid var(--border);
  box-shadow:0 -4px 24px rgba(0,0,0,.08);
  display:flex;flex-direction:column;
}
#library-header{
  padding:6px 16px 4px;display:flex;align-items:center;
  justify-content:space-between;flex-shrink:0;
}
#library-header h2{
  font-family:var(--font-serif);font-size:13px;color:var(--text2);
  letter-spacing:.04em;text-transform:uppercase;font-weight:400;
}
#library-scroll{
  flex:1;overflow-x:auto;overflow-y:hidden;
  display:flex;align-items:center;gap:10px;
  padding:0 16px 8px;
}
#library-scroll::-webkit-scrollbar{height:4px}
#library-scroll::-webkit-scrollbar-track{background:transparent}
#library-scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
#library-empty{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-size:12px;color:var(--text3);font-style:italic;
  padding-bottom:8px;
}

/* library item thumbnail */
.lib-item{
  flex-shrink:0;width:84px;height:80px;border-radius:8px;
  background:var(--surface2);border:1.5px solid var(--border-soft);
  cursor:grab;position:relative;overflow:hidden;
  transition:border-color .15s,box-shadow .15s,transform .15s;
  display:flex;flex-direction:column;
}
.lib-item:hover{
  border-color:var(--border);box-shadow:var(--shadow-lg);transform:translateY(-2px);
}
.lib-item.lib-dragging{opacity:.4;transform:scale(.95)}
.lib-item-stripe{height:5px;flex-shrink:0;border-radius:6px 6px 0 0}
.stripe-text  {background:var(--accent)}
.stripe-sketch{background:var(--accent2)}
.stripe-voice {background:var(--accent3)}
.lib-item-body{
  flex:1;padding:4px 6px;overflow:hidden;
  display:flex;flex-direction:column;justify-content:center;
}
.lib-item-label{
  font-size:10px;font-weight:600;color:var(--text2);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;
}
.lib-item-preview{
  font-size:10px;color:var(--text3);line-height:1.3;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
}
.lib-item-del{
  position:absolute;top:4px;right:4px;width:16px;height:16px;
  background:rgba(255,255,255,.85);border:none;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;opacity:0;transition:opacity .15s;padding:0;
}
.lib-item:hover .lib-item-del{opacity:1}
.lib-item-del:hover{background:var(--red-light)}
.lib-item-del:hover svg{stroke:var(--red)}
.lib-item-canvas{width:100%;flex:1;display:block;object-fit:cover}

/* â”€â”€ FAB (floating action button) â”€â”€ */
#fab-wrap{
  position:fixed;right:24px;bottom:calc(var(--lib-h) + 20px);
  z-index:400;display:flex;flex-direction:column;align-items:center;gap:10px;
}
#fab-options{
  display:flex;flex-direction:column;align-items:center;gap:8px;
  opacity:0;pointer-events:none;transform:translateY(10px);
  transition:opacity .2s,transform .2s;
}
#fab-wrap:hover #fab-options,
#fab-wrap.open #fab-options{opacity:1;pointer-events:all;transform:translateY(0)}
.fab-option{
  display:flex;align-items:center;gap:8px;
  padding:7px 14px 7px 10px;border-radius:20px;
  border:none;cursor:pointer;font-size:13px;font-weight:600;
  font-family:var(--font-sans);box-shadow:var(--shadow-lg);
  transition:transform .1s,box-shadow .1s;white-space:nowrap;
}
.fab-option:hover{transform:scale(1.04);box-shadow:var(--shadow-xl)}
.fab-text  {background:var(--accent);color:#fff}
.fab-sketch{background:var(--accent2);color:#fff}
.fab-voice {background:var(--accent3);color:#fff}
#fab-main{
  width:52px;height:52px;border-radius:50%;border:none;
  background:var(--text);color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:var(--shadow-xl);transition:transform .2s,background .15s;
  flex-shrink:0;
}
#fab-main:hover,#fab-wrap:hover #fab-main,#fab-wrap.open #fab-main{
  background:var(--accent);transform:rotate(45deg);
}

/* â”€â”€ MODAL â”€â”€ */
#modal-overlay{
  position:fixed;inset:0;background:rgba(20,18,14,.5);
  z-index:500;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(3px);
}
#modal-overlay.open{display:flex}
#modal{
  background:var(--surface);border-radius:16px;box-shadow:var(--shadow-xl);
  width:1340px;max-width:98vw;max-height:92vh;
  display:flex;flex-direction:column;overflow:hidden;
  animation:modal-in .2s ease;
}
@keyframes modal-in{from{opacity:0;transform:translateY(12px) scale(.97)}to{opacity:1;transform:none}}
.modal-body{padding:24px;flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:16px}
.modal-footer{
  padding:16px 24px;border-top:1px solid var(--border-soft);
  display:flex;justify-content:space-between;align-items:center;flex-shrink:0;
}

/* â”€â”€ TEXT EDITOR â”€â”€ */
#text-editor{
  width:100%;height:532px;padding:14px;outline:none;
  border:1.5px solid var(--border-soft);border-radius:9px;
  font-family:var(--font-sans);font-size:14px;line-height:1.8;
  color:var(--text);background:var(--bg);transition:border-color .15s;
  word-break:break-word;
}
#text-editor:focus{border-color:var(--accent)}
#text-editor b,#text-editor strong{font-weight:700}
#text-editor i,#text-editor em{font-style:italic}
.editor-toolbar{
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;
  padding:7px 10px;background:var(--surface2);border-radius:8px;
}
.editor-tb-btn{
  padding:4px 8px;border-radius:5px;border:1px solid transparent;
  background:transparent;font-size:12px;font-weight:500;
  cursor:pointer;font-family:var(--font-sans);color:var(--text2);
  transition:all .1s;white-space:nowrap;line-height:1.4;
}
.editor-tb-btn:hover{background:var(--surface);color:var(--text);border-color:var(--border-soft)}
.editor-tb-btn.active{background:var(--accent-light);color:var(--accent);border-color:var(--accent)}
.editor-tb-btn.math{font-family:var(--font-mono);font-size:13px;color:var(--accent)}
.editor-tb-btn.math:hover{background:var(--accent-light);border-color:var(--accent)}
.editor-tb-sep{width:1px;height:20px;background:var(--border-soft);margin:0 2px;flex-shrink:0}

/* â”€â”€ SKETCH EDITOR â”€â”€ */
#sketch-wrap{border:1.5px solid var(--border-soft);border-radius:9px;overflow:hidden;background:#fff}
#sketch-canvas{display:block;cursor:crosshair;touch-action:none}
.sketch-toolbar{
  display:flex;align-items:center;gap:6px;flex-wrap:wrap;
  padding:8px 10px;background:var(--surface2);border-bottom:1px solid var(--border-soft);
}
.sk-btn{
  width:30px;height:30px;border-radius:6px;border:1.5px solid transparent;
  background:var(--surface);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .1s;
}
.sk-btn:hover,.sk-btn.active{border-color:var(--accent);background:var(--accent-light)}
.sk-btn.erase:hover,.sk-btn.erase.active{border-color:var(--red);background:var(--red-light)}
.sk-btn:disabled{opacity:.35;cursor:not-allowed}
.sk-btn:disabled:hover{background:var(--surface);border-color:transparent}
.sk-sep{width:1px;height:22px;background:var(--border-soft);margin:0 2px;flex-shrink:0}
.color-dot{
  width:20px;height:20px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:transform .1s,border-color .1s;
}
.color-dot:hover{transform:scale(1.2)}
.color-dot.active{border-color:var(--text);transform:scale(1.15)}
#sk-size{width:60px;accent-color:var(--accent)}

/* â”€â”€ VOICE RECORDER â”€â”€ */
#voice-wrap{display:flex;flex-direction:column;align-items:center;gap:20px;padding:16px 0}
#voice-status{font-size:13px;color:var(--text2);min-height:20px;text-align:center}
#voice-visualiser{
  width:100%;height:60px;border-radius:8px;background:var(--surface2);
  border:1.5px solid var(--border-soft);display:block;
}
#voice-controls{display:flex;gap:12px;align-items:center;justify-content:center}
.voice-btn{
  display:flex;align-items:center;gap:7px;
  padding:9px 20px;border-radius:24px;border:none;
  font-size:13px;font-weight:600;font-family:var(--font-sans);
  cursor:pointer;transition:all .15s;
}
.voice-btn-record{background:var(--red);color:#fff}
.voice-btn-record:hover{background:#9a2828}
.voice-btn-stop{background:var(--surface2);color:var(--text);border:1.5px solid var(--border)}
.voice-btn-stop:hover{background:var(--border-soft)}
.voice-btn-play{background:var(--accent3);color:#fff}
.voice-btn-play:hover{filter:brightness(1.1)}
.voice-duration{font-size:12px;color:var(--text3);font-family:var(--font-mono)}
#voice-playback{width:100%;display:none}
#voice-playback audio{width:100%;border-radius:8px}

/* â”€â”€ ZOOM â”€â”€ */
#zoom-controls{
  position:fixed;right:24px;top:64px;
  display:flex;flex-direction:column;gap:4px;z-index:200;
}
.zoom-btn{
  width:34px;height:34px;border-radius:8px;
  background:var(--surface);border:1px solid var(--border-soft);
  box-shadow:var(--shadow);cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .1s;
}
.zoom-btn:hover{background:var(--accent-light);border-color:var(--accent)}
.zoom-btn:hover svg{stroke:var(--accent)}
#zoom-label{text-align:center;font-size:11px;font-weight:600;
  color:var(--text3);font-family:var(--font-mono);padding:2px 0}

/* â”€â”€ TOAST â”€â”€ */
#toast{
  position:fixed;bottom:calc(var(--lib-h) + 16px);left:50%;
  transform:translateX(-50%) translateY(8px);
  background:var(--text);color:#fff;
  padding:9px 18px;border-radius:8px;font-size:13px;font-weight:500;
  opacity:0;transition:opacity .2s,transform .2s;
  z-index:600;pointer-events:none;white-space:nowrap;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* recording pulse */
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.recording-dot{
  width:8px;height:8px;border-radius:50%;background:var(--red);
  animation:pulse 1s ease-in-out infinite;
}

/* â”€â”€ 3D MODEL â”€â”€ */
.card.has-model{border-top:3px solid #7B3FA0}
.dot-model{background:#7B3FA0}
.stripe-model{background:#7B3FA0}
.card-model-preview{flex:1;width:100%;border-radius:6px;overflow:hidden;background:#e8eef7}
.card-model-preview canvas{width:100%;height:100%;display:block}
.fab-model{background:#7B3FA0;color:#fff}

/* 3D editor layout */
#editor3d-wrap{display:flex;gap:0;height:580px;border:1.5px solid var(--border-soft);border-radius:9px;overflow:hidden}
#editor3d-sidebar{
  width:100px;flex-shrink:0;background:var(--surface2);
  border-right:1px solid var(--border-soft);
  display:flex;flex-direction:column;overflow:hidden;
}
#editor3d-sidebar-top{padding:10px;border-bottom:1px solid var(--border-soft);flex-shrink:0}
#editor3d-sidebar-top p{font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.05em;color:var(--text3);margin-bottom:8px}
.shape-add-btn-wrap{display:flex;flex-wrap:wrap;gap:5px}
.shape-add-btn{
  display:flex;align-items:center;justify-content:center;
  width:calc(100% - 4px);padding:6px 4px;border-radius:7px;border:1px solid var(--border-soft);
  background:var(--surface);cursor:pointer;transition:all .12s;
}
.shape-add-btn:hover{background:var(--accent-light);border-color:var(--accent)}

#editor3d-canvas-wrap{flex:1;position:relative;background:#e8eef7;cursor:grab}
#editor3d-canvas-wrap.grabbing{cursor:grabbing}
#editor3d-canvas{width:100%;height:100%;display:block}
#editor3d-props{
  width:280px;flex-shrink:0;background:var(--surface2);
  border-left:1px solid var(--border-soft);
  padding:14px;overflow-y:auto;
}
#editor3d-props h3{font-size:11px;font-weight:600;text-transform:uppercase;
  letter-spacing:.05em;color:var(--text3);margin-bottom:10px}
.prop-group{margin-bottom:12px}
.prop-group label{display:block;font-size:11px;color:var(--text2);margin-bottom:4px;font-weight:600}
.prop-row{display:flex;gap:4px;margin-bottom:4px}
/* stacked field: label row above, then number+slider */
.prop-field{margin-bottom:10px}
.prop-field-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:3px}
.prop-field-label{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.prop-field-val{font-size:11px;font-family:var(--font-mono);color:var(--accent);min-width:36px;text-align:right}
.prop-input{
  width:100%;padding:5px 8px;border-radius:6px;border:1.5px solid var(--border-soft);
  font-family:var(--font-mono);font-size:12px;color:var(--text);
  background:var(--surface);outline:none;
  transition:border-color .12s;margin-bottom:4px;
}
.prop-input:focus{border-color:var(--accent)}

.prop-xyz{font-size:9px;color:var(--text3);text-align:center;margin-top:1px}
.prop-swatches{display:grid;grid-template-columns:repeat(7,22px);gap:5px;padding:2px 0}
.prop-swatch{
  width:22px;height:22px;border-radius:5px;border:2px solid transparent;
  cursor:pointer;transition:transform .1s,border-color .1s;flex-shrink:0;
}
.prop-swatch:hover{transform:scale(1.15)}
.prop-swatch.active{border-color:var(--text);transform:scale(1.12)}
#editor3d-hint{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  font-size:11px;color:rgba(255,255,255,.45);pointer-events:none;white-space:nowrap;
}
#editor3d-empty-props{color:var(--text3);font-size:12px;font-style:italic;margin-top:4px}
</style>
</head>

<script type="module">
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  SVG ICONS

const SVG = {

  upload: '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/><polyline points="16 5 19 2 22 5"/><line x1="19" y1="2" x2="19" y2="10"/></svg>',

  check:  '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',

  plus:   '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>',
  mic:    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>',
  stop:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/></svg>',
  play:   '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>',
  undoSm: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 14 4 9 9 4"/><path d="M20 20v-7a4 4 0 0 0-4-4H4"/></svg>',
  redoSm: '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 14 20 9 15 4"/><path d="M4 20v-7a4 4 0 0 1 4-4h12"/></svg>',
  lib:    '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>',
};
const ico = k => `<span style="display:inline-flex;align-items:center;justify-content:center">${SVG[k]}</span>`;

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  CONSTANTS
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const CELL_W = 240, CELL_H = 200, CELL_GAP = 40;
const SLOT_W = CELL_W + CELL_GAP, SLOT_H = CELL_H + CELL_GAP;
const COLORS = ['#1A1814','#2D5A8E','#B85C1A','#2A7A4B','#B83232','#7B3FA0'];

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  STATE
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
// library: [{id, type:'text'|'sketch'|'voice', label, content, createdAt}]
// cells:   {"r,c": {title, libraryItemId|null}}
const state = {
  cells: {},
  library: [],
  panX: 0, panY: 0, zoom: 1,
  selectedKey: null,
  dragCardKey: null,   // card being dragged on canvas
  dragLibId: null,     // library item being dragged onto a card
  _saveAndClose: null,
};

let libIdCounter = 1;
function newLibId(){ return 'lib_' + (libIdCounter++); }

function initCells(){
  state.cells['0,0'] = { title:'', libraryItemId: null };
}
initCells();

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  USAGE LOG
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
window.__usageLog = [];
function logUsage(event, detail = {}){
  window.__usageLog.push({ t: Date.now(), event, ...detail });
}
logUsage('session_start');

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  DOM REFS
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
const gridEl      = document.getElementById('grid');
const canvasEl    = document.getElementById('canvas');
const canvasWrap  = document.getElementById('canvas-wrap');
const overlay     = document.getElementById('modal-overlay');
const modalBody   = document.getElementById('modal-body');
const modalFooter = document.getElementById('modal-footer');
const libScroll   = document.getElementById('library-scroll');
const libEmpty    = document.getElementById('library-empty');
const libCount    = document.getElementById('library-count');

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  LIBRARY HELPERS
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function getLibItem(id){ return state.library.find(x => x.id === id) || null; }

function addLibItem(item){
  state.library.push(item);
  renderLibrary();
  logUsage('lib_item_add', {id: item.id, type: item.type});
}

function deleteLibItem(id){
  state.library = state.library.filter(x => x.id !== id);
  // detach from any cards referencing it
  for(const cell of Object.values(state.cells)){
    if(cell.libraryItemId === id) cell.libraryItemId = null;
  }
  renderLibrary();
  rerender();
  logUsage('lib_item_delete', {id});
}

function renderLibrary(){
  // remove all item nodes (keep #library-empty)
  libScroll.querySelectorAll('.lib-item').forEach(el => el.remove());
  libEmpty.style.display = state.library.length ? 'none' : 'flex';
  libCount.textContent = state.library.length ? `${state.library.length} item${state.library.length>1?'s':''}` : '';

  state.library.forEach(item => {
    const el = document.createElement('div');
    el.className = 'lib-item';
    el.dataset.id = item.id;
    el.setAttribute('draggable', 'true');
    el.title = item.label || item.type;

    const stripe = document.createElement('div');
    stripe.className = `lib-item-stripe stripe-${item.type}`;
    el.appendChild(stripe);

    const body = document.createElement('div');
    body.className = 'lib-item-body';

    const label = document.createElement('div');
    label.className = 'lib-item-label';
    label.textContent = item.label || '(untitled)';
    body.appendChild(label);

    if(item.type === 'text'){
      const prev = document.createElement('div');
      prev.className = 'lib-item-preview';
      const tmp = document.createElement('div');
      tmp.innerHTML = item.content || '';
      prev.textContent = (tmp.textContent || '').trim().slice(0, 60);
      body.appendChild(prev);
    } else if(item.type === 'sketch'){
      if(item.content){
        const img = document.createElement('img');
        img.src = item.content;
        img.style.cssText = 'width:100%;height:44px;object-fit:cover;border-radius:0 0 6px 6px;display:block';
        body.appendChild(img);
      } else {
        const prev = document.createElement('div');
        prev.className = 'lib-item-preview';
        prev.textContent = 'Sketch';
        body.appendChild(prev);
      }
    } else if(item.type === 'voice'){
      const prev = document.createElement('div');
      prev.className = 'lib-item-preview';
      prev.innerHTML = `${ico('mic')} ${item.duration || ''}`;
      body.appendChild(prev);
    }
    el.appendChild(body);

    // delete button
    const del = document.createElement('button');
    del.className = 'lib-item-del';
    del.title = 'Remove from library';
    del.innerHTML = `<svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`;
    del.addEventListener('click', e => { e.stopPropagation(); deleteLibItem(item.id); });
    el.appendChild(del);

    // drag from library
    el.addEventListener('dragstart', e => {
      state.dragLibId = item.id;
      e.dataTransfer.effectAllowed = 'copy';
      el.classList.add('lib-dragging');
      // drag image: simple type-coloured tile
      const dc = buildLibDragImage(item);
      document.body.appendChild(dc);
      e.dataTransfer.setDragImage(dc, 42, 40);
      setTimeout(() => document.body.removeChild(dc), 0);
      logUsage('lib_drag_start', {id: item.id});
    });
    el.addEventListener('dragend', () => {
      el.classList.remove('lib-dragging');
      state.dragLibId = null;
    });

    // open editor on click
    el.addEventListener('click', () => openLibItemEditor(item.id));

    // touch drag from library
    wireLibItemTouch(el, item);

    libScroll.appendChild(el);
  });
}

function buildLibDragImage(item){
  const W = 84, H = 80;
  const dc = document.createElement('canvas');
  dc.width = W; dc.height = H;
  dc.style.position = 'fixed'; dc.style.top = '-200px';
  const ctx = dc.getContext('2d');
  const col = item.type==='sketch' ? '#B85C1A' : item.type==='voice' ? '#2A7A4B' : item.type==='model' ? '#7B3FA0' : '#2D5A8E';

  // card shape via arcTo
  function rr(x,y,w,h,r){
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.arcTo(x+w,y,x+w,y+r,r);
    ctx.lineTo(x+w,y+h-r); ctx.arcTo(x+w,y+h,x+w-r,y+h,r);
    ctx.lineTo(x+r,y+h); ctx.arcTo(x,y+h,x,y+h-r,r);
    ctx.lineTo(x,y+r); ctx.arcTo(x,y,x+r,y,r); ctx.closePath();
  }
  ctx.fillStyle='#fff'; rr(2,2,W-4,H-4,7); ctx.fill();
  ctx.strokeStyle=col; ctx.lineWidth=2; rr(2,2,W-4,H-4,7); ctx.stroke();
  ctx.fillStyle=col; ctx.fillRect(2,2,W-4,7);
  ctx.fillStyle='#fff'; ctx.fillRect(2,2,7,7); ctx.fillRect(W-9,2,7,7);
  ctx.fillStyle=col; rr(2,2,W-4,9,7); ctx.fill();
  ctx.fillStyle='#D8D4CB';
  ctx.fillRect(10,18,W-20,4); ctx.fillRect(10,27,W-20,4); ctx.fillRect(10,36,(W-20)*.6,4);
  return dc;
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  GRID RENDER
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function rerender(){
  // clean up any existing model preview renderers
  if(window._modelPreviewDisposers){ window._modelPreviewDisposers.forEach(fn=>fn()); }
  window._modelPreviewDisposers = [];
  gridEl.innerHTML = '';
  let minR=Infinity,maxR=-Infinity,minC=Infinity,maxC=-Infinity;
  for(const k of Object.keys(state.cells)){
    const [r,c]=k.split(',').map(Number);
    minR=Math.min(minR,r);maxR=Math.max(maxR,r);
    minC=Math.min(minC,c);maxC=Math.max(maxC,c);
  }
  if(minR===Infinity){minR=maxR=minC=maxC=0;}

  gridEl.style.width  = ((maxC-minC+1)*SLOT_W-CELL_GAP)+'px';
  gridEl.style.height = ((maxR-minR+1)*SLOT_H-CELL_GAP)+'px';
  for(const [key,cell] of Object.entries(state.cells)){
    const [r,c]=key.split(',').map(Number);
    gridEl.appendChild(buildCellWrapper(key,r,c,cell,(c-minC)*SLOT_W,(r-minR)*SLOT_H));
  }
  updateTransform();
  // init live 3D previews after DOM is ready
  requestAnimationFrame(initModelPreviews);
}

function buildCellWrapper(key, row, col, cell, x, y){
  const wrap = document.createElement('div');
  wrap.className = 'cell-wrapper';
  wrap.dataset.key = key;
  wrap.style.left = x+'px'; wrap.style.top = y+'px';
  wrap.style.width = CELL_W+'px'; wrap.style.height = CELL_H+'px';

  // + buttons
  ['top','bottom','left','right'].forEach(dir => {
    if(state.cells[neighbourKey(row,col,dir)]) return;
    const btn = document.createElement('button');
    btn.className = `add-btn add-${dir}`;
    btn.title = `Add card ${dir}`;
    btn.innerHTML = SVG.plus;
    btn.addEventListener('click', e => { e.stopPropagation(); addCell(row,col,dir); });
    wrap.appendChild(btn);
  });

  const card = buildCard(key, cell);

  // card drag (repositioning)
  card.setAttribute('draggable','true');
  card.addEventListener('dragstart', e => {
    if(state.dragLibId) return; // library drag takes priority
    state.dragCardKey = key;
    e.dataTransfer.effectAllowed = 'move';
    const item = cell.libraryItemId ? getLibItem(cell.libraryItemId) : null;
    const dc = item ? buildLibDragImage(item) : buildEmptyDragImage();
    document.body.appendChild(dc);
    e.dataTransfer.setDragImage(dc, CELL_W/2, 30);
    setTimeout(()=>{ document.body.removeChild(dc); wrap.classList.add('dragging-card'); },0);
    logUsage('card_drag_start',{key});
  });
  card.addEventListener('dragend', ()=>{
    wrap.classList.remove('dragging-card');
    document.querySelectorAll('.card.drop-target').forEach(c=>c.classList.remove('drop-target'));
    state.dragCardKey = null;
  });
  wireCardTouch(card, key);  // touch repositioning

  // accept drops: library items OR card swaps
  wrap.addEventListener('dragover', e => {
    if(!state.dragLibId && !state.dragCardKey) return;
    if(state.dragCardKey === key) return;
    e.preventDefault(); e.dataTransfer.dropEffect = state.dragLibId ? 'copy' : 'move';
    card.classList.add('drop-target');
  });
  wrap.addEventListener('dragleave', e => {
    if(!wrap.contains(e.relatedTarget)) card.classList.remove('drop-target');
  });
  wrap.addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation();
    card.classList.remove('drop-target');
    if(state.dragLibId){
      // assign library item to this card
      cell.libraryItemId = state.dragLibId;
      const _dli = getLibItem(state.dragLibId);
      if(_dli?.label) cell.title = _dli.label;
      state.dragLibId = null;
      logUsage('lib_item_assigned',{cardKey:key});
      rerender();
    } else if(state.dragCardKey && state.dragCardKey !== key){
      // swap cards
      const a = {...state.cells[state.dragCardKey]};
      const b = {...state.cells[key]};
      state.cells[state.dragCardKey] = b;
      state.cells[key] = a;
      state.dragCardKey = null;
      logUsage('card_swap',{from:key});
      rerender();
    }
  });

  wrap.appendChild(card);
  return wrap;
}

function buildEmptyDragImage(){
  const W=CELL_W, H=40;
  const dc=document.createElement('canvas');
  dc.width=W; dc.height=H;
  dc.style.position='fixed'; dc.style.top='-200px';
  const ctx=dc.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  ctx.strokeStyle='#D8D4CB'; ctx.lineWidth=1.5;
  ctx.strokeRect(1,1,W-2,H-2);
  return dc;
}

function neighbourKey(r,c,dir){
  return dir==='top'?`${r-1},${c}`:dir==='bottom'?`${r+1},${c}`:dir==='left'?`${r},${c-1}`:`${r},${c+1}`;
}

function buildCard(key, cell){
  const item = cell.libraryItemId ? getLibItem(cell.libraryItemId) : null;
  const hasContent = !!item;
  const typeClass = item ? `has-${item.type}` : 'empty';

  const card = document.createElement('div');
  card.className = `card ${typeClass}`;
  card.dataset.key = key;
  if(state.selectedKey === key) card.classList.add('selected');

  if(!hasContent){
    const body = document.createElement('div');
    body.className = 'card-body center';

    const hint = document.createElement('p');
    hint.className = 'empty-hint';
    hint.style.marginBottom = '8px';
    hint.textContent = 'Drop content here';
    body.appendChild(hint);

    const libBtn = document.createElement('button');
    libBtn.className = 'add-from-lib-btn';
    libBtn.innerHTML = `${ico('lib')} Add from library`;
    libBtn.addEventListener('click', e => {
      e.stopPropagation();
      selectCell(key);         // ensure card is selected on the same tap
      showLibraryPicker(key);
    });
    body.appendChild(libBtn);
    card.appendChild(body);
    card.addEventListener('click', () => selectCell(key));
  } else {
    // header
    const header = document.createElement('div');
    header.className = 'card-header';

    const dot = document.createElement('span');
    dot.className = `type-dot dot-${item.type}`;

    const titleInput = document.createElement('input');
    titleInput.type = 'text';
    titleInput.className = 'card-title-input';
    titleInput.value = cell.title || '';
    titleInput.placeholder = 'Untitled card';
    titleInput.maxLength = 60;
    titleInput.addEventListener('click', e => e.stopPropagation());
    titleInput.addEventListener('mousedown', e => e.stopPropagation());
    titleInput.addEventListener('blur', () => { cell.title = titleInput.value; });
    titleInput.addEventListener('change', () => {
      cell.title = titleInput.value;
      logUsage('card_title_change',{key});
    });

    const actions = document.createElement('div');
    actions.className = 'card-actions';

    const editBtn = document.createElement('button');
    editBtn.className = 'card-action-btn';
    editBtn.title = 'Edit content';
    editBtn.innerHTML = ico('pencil');
    editBtn.addEventListener('click', e => { e.stopPropagation(); openLibItemEditor(item.id); });

    const detachBtn = document.createElement('button');
    detachBtn.className = 'card-action-btn del';
    detachBtn.title = 'Remove content from card';
    detachBtn.innerHTML = ico('trash');
    detachBtn.addEventListener('click', e => {
      e.stopPropagation();
      cell.libraryItemId = null;
      logUsage('card_detach',{key});
      rerender();
    });

    actions.appendChild(editBtn);
    actions.appendChild(detachBtn);
    header.appendChild(dot);
    header.appendChild(titleInput);
    header.appendChild(actions);
    card.appendChild(header);

    // body
    const body = document.createElement('div');
    body.className = 'card-body';

    if(item.type === 'text'){
      const pre = document.createElement('div');
      pre.className = 'card-text-content' + (item.content ? '' : ' empty-preview');
      if(item.content) pre.innerHTML = item.content;
      else pre.textContent = 'Empty text item.';
      body.appendChild(pre);
    } else if(item.type === 'sketch'){
      const pw = document.createElement('div');
      pw.className = 'card-sketch-preview';
      const pc = document.createElement('canvas');
      pc.width = 200; pc.height = 130;
      pw.appendChild(pc);
      body.appendChild(pw);
      if(item.content){
        const img = new Image();
        img.onload = () => pc.getContext('2d').drawImage(img,0,0,200,130);
        img.src = item.content;
      }
    } else if(item.type === 'model'){
      const mp = document.createElement('div');
      mp.className = 'card-model-preview';
      mp.dataset.modelId = item.id;
      // live 3D preview rendered after DOM insertion
      body.appendChild(mp);
    } else if(item.type === 'voice'){
      const vp = document.createElement('div');
      vp.className = 'card-voice-preview';
      const lbl = document.createElement('div');
      lbl.className = 'card-voice-label';
      lbl.innerHTML = `${ico('mic')} Voice recording${item.duration?' · '+item.duration:''}`;
      vp.appendChild(lbl);
      if(item.content){
        const audio = document.createElement('audio');
        audio.controls = true;
        audio.src = item.content;
        audio.className = 'card-voice-preview audio';
        vp.appendChild(audio);
      }
      body.appendChild(vp);
    }
    card.appendChild(body);
    card.addEventListener('click', () => selectCell(key));
  }
  return card;
}

function selectCell(key){
  state.selectedKey = key;
  document.querySelectorAll('.card.selected').forEach(c=>c.classList.remove('selected'));
  document.querySelector(`.card[data-key="${key}"]`)?.classList.add('selected');
  logUsage('card_select',{key});
}

//  ADD / DELETE CELLS
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function addCell(row, col, dir){
  const nKey = neighbourKey(row,col,dir);
  if(state.cells[nKey]) return;
  state.cells[nKey] = {title:'', libraryItemId:null};
  logUsage('cell_add',{key:nKey,dir});
  // Compensate pan so existing cells stay fixed on screen.
  // Adding top/left shifts all cells down/right in grid-local coords;
  // we move the canvas up/left by the same amount to cancel it out.
  if(dir === 'top')  state.panY -= SLOT_H * state.zoom;
  if(dir === 'left') state.panX -= SLOT_W * state.zoom;
  rerender();
}

function deleteCell(key){
  delete state.cells[key];
  if(state.selectedKey===key) state.selectedKey=null;
  logUsage('cell_delete',{key});
  if(!Object.keys(state.cells).length){ initCells(); rerender(); centerView(); }
  else rerender();
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  TEXT EDITOR
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function openTextEditor(item){
  const MATH = [
    ['⋅','⋅'],['≠','≠'],['√','√'],['Σ','Σ'],['π','π'],
  ];
  modalBody.innerHTML =
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
    '<label style="font-size:12px;font-weight:600;color:var(--text2)">Label</label>' +
    '<input id="item-label" type="text" maxlength="60" placeholder="Name this item…" style="flex:1;padding:5px 10px;border-radius:6px;border:1.5px solid var(--border-soft);font-family:var(--font-sans);font-size:13px;outline:none;background:var(--bg)" value="' + (item.label||'').replace(/"/g,'&quot;') + '">' +
    '</div>' +
    '<div class="editor-toolbar" id="tb-main">' +
    '<span style="font-size:10px;font-weight:600;letter-spacing:.05em;color:var(--text3);text-transform:uppercase;margin-right:2px">Math</span>' +
    MATH.map(([lbl],i)=>`<button class="editor-tb-btn math" data-math="${i}">${lbl}</button>`).join('') +
    '<div class="editor-tb-sep"></div>' +
    '<span style="font-size:10px;font-weight:600;letter-spacing:.05em;color:var(--text3);text-transform:uppercase;margin-right:2px">Format</span>' +
    '<button class="editor-tb-btn fmt-bold"      data-cmd="bold"        title="Bold">B</button>' +
    '<button class="editor-tb-btn fmt-italic"    data-cmd="italic"      title="Italic">I</button>' +
    '<button class="editor-tb-btn fmt-underline" data-cmd="underline"   title="Underline">U</button>' +
    '<button class="editor-tb-btn fmt-super"     data-cmd="superscript" title="Superscript">x<sup style="font-size:.7em">n</sup></button>' +
    '<button class="editor-tb-btn fmt-sub"       data-cmd="subscript"   title="Subscript">x<sub style="font-size:.7em">n</sub></button>' +
    '<div class="editor-tb-sep"></div>' +
    `<button class="editor-tb-btn" id="txt-undo" title="Undo">${ico('undoSm')}</button>` +
    `<button class="editor-tb-btn" id="txt-redo" title="Redo">${ico('redoSm')}</button>` +
    '</div>' +
    '<div id="text-editor" contenteditable="true" spellcheck="true"></div>';

  const editor = document.getElementById('text-editor');
  editor.innerHTML = item.content || '';

  function insertSymbol(ch){
    editor.focus();
    const sel=window.getSelection(); if(!sel.rangeCount) return;
    const range=sel.getRangeAt(0); range.deleteContents();
    range.insertNode(document.createTextNode(ch)); range.collapse(false);
    sel.removeAllRanges(); sel.addRange(range);
  }
  document.querySelectorAll('[data-math]').forEach(btn=>{
    const [,ch]=MATH[+btn.dataset.math];
    btn.addEventListener('mousedown',e=>e.preventDefault());
    btn.addEventListener('click',()=>insertSymbol(ch));
  });
  document.querySelectorAll('[data-cmd]').forEach(btn=>{
    btn.addEventListener('mousedown',e=>e.preventDefault());
    btn.addEventListener('click',()=>{ document.execCommand(btn.dataset.cmd,false,null); editor.focus(); updateFmt(); });
  });
  function updateFmt(){
    ['bold','italic','underline','superscript','subscript'].forEach(cmd=>{
      document.querySelector(`[data-cmd="${cmd}"]`)?.classList.toggle('active',document.queryCommandState(cmd));
    });
  }
  editor.addEventListener('keyup',updateFmt);
  editor.addEventListener('mouseup',updateFmt);
  document.getElementById('txt-undo').addEventListener('mousedown',e=>e.preventDefault());
  document.getElementById('txt-undo').addEventListener('click',()=>{ document.execCommand('undo'); editor.focus(); });
  document.getElementById('txt-redo').addEventListener('mousedown',e=>e.preventDefault());
  document.getElementById('txt-redo').addEventListener('click',()=>{ document.execCommand('redo'); editor.focus(); });

  const origContent = item.content||'', origLabel = item.label||'';
  function doSave(){
    item.content = editor.innerHTML;
    item.label = document.getElementById('item-label').value || 'Text';
    closeModal(); renderLibrary(); rerender();
    logUsage('text_save',{id:item.id, durationMs:Date.now()-_textOpenedAt}); toast('Saved');
  }
  function doDiscard(){ item.content=origContent; item.label=origLabel; logUsage('text_discard',{id:item.id, durationMs:Date.now()-_textOpenedAt}); closeModal(); }
  state._saveAndClose = doSave;

  modalFooter.innerHTML =
    `<button class="btn btn-primary" id="save-text">${ico('check')}Save</button>` +
    '<button class="btn btn-ghost btn-danger-soft" id="discard-text">Discard changes</button>';
  openModal();
  setTimeout(()=>{ editor.focus(); updateFmt(); },50);
  document.getElementById('save-text').addEventListener('click',doSave);
  document.getElementById('discard-text').addEventListener('click',doDiscard);
  const _textOpenedAt = Date.now();
  logUsage('text_editor_open',{id:item.id});
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  SKETCH EDITOR
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
let sketchCtx=null, sketchDrawing=false;
let sketchTool='pen', sketchColor='#1A1814', sketchSize=4;
let sketchUndoStack=[], sketchRedoStack=[];

function openSketchEditor(item){
  modalBody.innerHTML =
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
    '<label style="font-size:12px;font-weight:600;color:var(--text2)">Label</label>' +
    '<input id="item-label" type="text" maxlength="60" placeholder="Name this item…" style="flex:1;padding:5px 10px;border-radius:6px;border:1.5px solid var(--border-soft);font-family:var(--font-sans);font-size:13px;outline:none;background:var(--bg)" value="' + (item.label||'').replace(/"/g,'&quot;') + '">' +
    '</div>' +
    `<div id="sketch-wrap">
      <div class="sketch-toolbar">
        <button class="sk-btn active" id="sk-pen"   title="Pen">${ico('pen')}</button>
        <button class="sk-btn"        id="sk-line"  title="Line">${ico('line')}</button>
        <div class="sk-sep"></div>
        ${COLORS.map((c,i)=>`<div class="color-dot${i===0?' active':''}" data-color="${c}" style="background:${c}" title="${c}"></div>`).join('')}
        <button class="sk-btn erase" id="sk-erase" title="Eraser">${ico('erase')}</button>
        <div class="sk-sep"></div>
        <label for="sk-size" style="font-size:11px;color:var(--text2)">Size</label>
        <input type="range" id="sk-size" min="1" max="20" value="${sketchSize}" style="width:70px">
        <div class="sk-sep"></div>
        <button class="sk-btn" id="sk-undo" title="Undo (Ctrl+Z)">${ico('undo')}</button>
        <button class="sk-btn" id="sk-redo" title="Redo (Ctrl+Y)">${ico('redo')}</button>
        <div class="sk-sep"></div>
        <button class="sk-btn" id="sk-clear"  title="Clear">${ico('trash')}</button>
        <button class="sk-btn" id="sk-upload" title="Upload image">${ico('upload')}</button>
        <input type="file" id="sk-file" accept="image/*" style="display:none">
      </div>
      <canvas id="sketch-canvas"
        style="width:100%;height:532px;touch-action:none"></canvas>
    </div>`;

  const origContent = item.content||'', origLabel = item.label||'';
  function doSave(){
    document.removeEventListener('keydown',sketchKeys);
    item.content = canvas2.toDataURL('image/png');
    item.label = document.getElementById('item-label').value || 'Sketch';
    closeModal(); renderLibrary(); rerender();
    logUsage('sketch_save',{id:item.id, durationMs:Date.now()-_sketchOpenedAt}); toast('Saved');
  }
  function doDiscard(){
    document.removeEventListener('keydown',sketchKeys);
    item.content=origContent; item.label=origLabel;
    logUsage('sketch_discard',{id:item.id, durationMs:Date.now()-_sketchOpenedAt});
    closeModal();
  }
  state._saveAndClose = doSave;

  modalFooter.innerHTML =
    `<button class="btn btn-primary" id="save-sketch">${ico('check')}Save</button>` +
    '<button class="btn btn-ghost btn-danger-soft" id="discard-sketch">Discard changes</button>';
  openModal();

  const canvas2 = document.getElementById('sketch-canvas');
  // Match bitmap resolution to CSS layout size — prevents stretch
  canvas2.width  = canvas2.offsetWidth;
  canvas2.height = canvas2.offsetHeight;
  sketchCtx = canvas2.getContext('2d');
  sketchUndoStack=[]; sketchRedoStack=[];
  sketchCtx.fillStyle='#ffffff'; sketchCtx.fillRect(0,0,canvas2.width,canvas2.height);

  function pushUndo(){
    sketchUndoStack.push(sketchCtx.getImageData(0,0,canvas2.width,canvas2.height));
    sketchRedoStack=[];
    document.getElementById('sk-undo').disabled=false;
    document.getElementById('sk-redo').disabled=true;
  }
  function updateUndoBtns(){
    document.getElementById('sk-undo').disabled=!sketchUndoStack.length;
    document.getElementById('sk-redo').disabled=!sketchRedoStack.length;
  }

  if(item.content){
    const img=new Image();
    img.onload=()=>{ sketchCtx.drawImage(img,0,0,canvas2.width,canvas2.height); updateUndoBtns(); };
    img.src=item.content;
  } else { updateUndoBtns(); }

  sketchTool='pen';
  ['pen','line','erase'].forEach(t=>{
    document.getElementById('sk-'+t)?.addEventListener('click',()=>{
      sketchTool=t;
      document.querySelectorAll('.sk-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById('sk-'+t).classList.add('active');
    });
  });
  document.querySelectorAll('.color-dot').forEach(dot=>{
    dot.addEventListener('click',()=>{
      document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('active'));
      dot.classList.add('active'); sketchColor=dot.dataset.color;
      if(sketchTool==='erase'){
        sketchTool='pen';
        document.querySelectorAll('.sk-btn').forEach(b=>b.classList.remove('active'));
        document.getElementById('sk-pen').classList.add('active');
      }
    });
  });
  document.getElementById('sk-size').addEventListener('input',e=>{ sketchSize=parseInt(e.target.value); });
  document.getElementById('sk-undo').addEventListener('click',()=>{
    if(!sketchUndoStack.length) return;
    sketchRedoStack.push(sketchCtx.getImageData(0,0,canvas2.width,canvas2.height));
    sketchCtx.putImageData(sketchUndoStack.pop(),0,0); updateUndoBtns();
  });
  document.getElementById('sk-redo').addEventListener('click',()=>{
    if(!sketchRedoStack.length) return;
    sketchUndoStack.push(sketchCtx.getImageData(0,0,canvas2.width,canvas2.height));
    sketchCtx.putImageData(sketchRedoStack.pop(),0,0); updateUndoBtns();
  });
  document.getElementById('sk-clear').addEventListener('click',()=>{
    pushUndo(); sketchCtx.clearRect(0,0,canvas2.width,canvas2.height);
    sketchCtx.fillStyle='#ffffff'; sketchCtx.fillRect(0,0,canvas2.width,canvas2.height);
  });
  document.getElementById('sk-upload').addEventListener('click',()=>document.getElementById('sk-file').click());
  document.getElementById('sk-file').addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const img=new Image();
      img.onload=()=>{
        pushUndo(); sketchCtx.clearRect(0,0,canvas2.width,canvas2.height);
        sketchCtx.fillStyle='#ffffff'; sketchCtx.fillRect(0,0,canvas2.width,canvas2.height);
        const s=Math.min(canvas2.width/img.width,canvas2.height/img.height);
        sketchCtx.drawImage(img,(canvas2.width-img.width*s)/2,(canvas2.height-img.height*s)/2,img.width*s,img.height*s);
      };
      img.src=ev.target.result;
    };
    reader.readAsDataURL(f);
  });

  let lineStart=null,snapData=null;
  function getPos(e){
    const rect=canvas2.getBoundingClientRect();
    const src=e.touches?e.touches[0]:e;
    return{x:(src.clientX-rect.left)*canvas2.width/rect.width, y:(src.clientY-rect.top)*canvas2.height/rect.height};
  }
  function startDraw(e){
    e.preventDefault(); sketchDrawing=true; pushUndo();
    const p=getPos(e);
    if(sketchTool==='line'){lineStart=p;snapData=sketchUndoStack[sketchUndoStack.length-1];}
    else{sketchCtx.beginPath();sketchCtx.moveTo(p.x,p.y);}
  }
  function moveDraw(e){
    if(!sketchDrawing) return; e.preventDefault();
    const p=getPos(e);
    if(sketchTool==='pen'){
      sketchCtx.globalCompositeOperation='source-over';
      sketchCtx.strokeStyle=sketchColor; sketchCtx.lineWidth=sketchSize;
      sketchCtx.lineCap=sketchCtx.lineJoin='round';
      sketchCtx.lineTo(p.x,p.y); sketchCtx.stroke();
      sketchCtx.beginPath(); sketchCtx.moveTo(p.x,p.y);
    } else if(sketchTool==='erase'){
      sketchCtx.globalCompositeOperation='destination-out';
      sketchCtx.lineWidth=sketchSize*2; sketchCtx.lineCap='round';
      sketchCtx.beginPath(); sketchCtx.arc(p.x,p.y,sketchSize,0,Math.PI*2); sketchCtx.fill();
      sketchCtx.globalCompositeOperation='source-over';
    } else if(sketchTool==='line'&&lineStart){
      sketchCtx.putImageData(snapData,0,0);
      sketchCtx.beginPath(); sketchCtx.strokeStyle=sketchColor;
      sketchCtx.lineWidth=sketchSize; sketchCtx.lineCap='round';
      sketchCtx.moveTo(lineStart.x,lineStart.y); sketchCtx.lineTo(p.x,p.y); sketchCtx.stroke();
    }
  }
  function endDraw(){ sketchDrawing=false; lineStart=null; snapData=null; }

  canvas2.addEventListener('mousedown',startDraw);
  canvas2.addEventListener('mousemove',moveDraw);
  canvas2.addEventListener('mouseup',endDraw);
  canvas2.addEventListener('mouseleave',endDraw);
  canvas2.addEventListener('touchstart',startDraw,{passive:false});
  canvas2.addEventListener('touchmove',moveDraw,{passive:false});
  canvas2.addEventListener('touchend',endDraw);

  function sketchKeys(e){
    if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();document.getElementById('sk-undo').click();}
    if((e.ctrlKey||e.metaKey)&&(e.key==='y'||(e.shiftKey&&e.key==='Z'))){e.preventDefault();document.getElementById('sk-redo').click();}
  }
  document.addEventListener('keydown',sketchKeys);
  state._saveAndClose=doSave;
  document.getElementById('save-sketch').addEventListener('click',doSave);
  document.getElementById('discard-sketch').addEventListener('click',doDiscard);
  const _sketchOpenedAt = Date.now();
  logUsage('sketch_editor_open',{id:item.id});
}

// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
//  VOICE EDITOR
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function openVoiceEditor(item){
  modalBody.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
      <label style="font-size:12px;font-weight:600;color:var(--text2)">Label</label>
      <input id="item-label" type="text" maxlength="60" placeholder="Name this recording…"
        style="flex:1;padding:5px 10px;border-radius:6px;border:1.5px solid var(--border-soft);font-family:var(--font-sans);font-size:13px;outline:none;background:var(--bg)"
        value="${(item.label||'').replace(/"/g,'&quot;')}">
    </div>
    <div id="voice-wrap">
      <canvas id="voice-visualiser"></canvas>
      <div id="voice-status">Ready to record</div>
      <div id="voice-controls">
        <button class="voice-btn voice-btn-record" id="vc-record">${ico('mic')} Record</button>
        <button class="voice-btn voice-btn-stop" id="vc-stop" style="display:none">${ico('stop')} Stop</button>
        <span class="voice-duration" id="vc-duration"></span>
      </div>
      <div id="voice-playback">
        <audio id="vc-audio" controls></audio>
      </div>
    </div>`;

  const origContent=item.content||'', origLabel=item.label||'', origDuration=item.duration||'';
  let mediaRecorder=null, audioChunks=[], audioBlob=null, animFrame=null, recInterval=null, recSeconds=0;

  // show existing recording if any
  if(item.content){
    const pb=document.getElementById('voice-playback');
    pb.style.display='block';
    document.getElementById('vc-audio').src=item.content;
    document.getElementById('voice-status').textContent='Previous recording loaded. Record again to replace.';
  }

  // draw idle waveform
  const vis=document.getElementById('voice-visualiser');
  vis.width=vis.offsetWidth||560; vis.height=60;
  const vctx=vis.getContext('2d');
  function drawIdle(){
    vctx.clearRect(0,0,vis.width,vis.height);
    vctx.strokeStyle='#D8D4CB'; vctx.lineWidth=1.5;
    vctx.beginPath(); vctx.moveTo(0,30); vctx.lineTo(vis.width,30); vctx.stroke();
  }
  drawIdle();

  let analyser=null, dataArray=null;
  function drawWave(){
    if(!analyser){animFrame=requestAnimationFrame(drawWave);return;}
    analyser.getByteTimeDomainData(dataArray);
    vctx.clearRect(0,0,vis.width,vis.height);
    vctx.strokeStyle='var(--red,#B83232)'; vctx.lineWidth=2;
    vctx.beginPath();
    const step=vis.width/dataArray.length;
    dataArray.forEach((v,i)=>{
      const y=(v/128-1)*25+30;
      i===0?vctx.moveTo(0,y):vctx.lineTo(i*step,y);
    });
    vctx.stroke();
    animFrame=requestAnimationFrame(drawWave);
  }

  document.getElementById('vc-record').addEventListener('click', async()=>{
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      const AudioCtx=window.AudioContext||window.webkitAudioContext;
      const actx=new AudioCtx();
      const src=actx.createMediaStreamSource(stream);
      analyser=actx.createAnalyser(); analyser.fftSize=256;
      dataArray=new Uint8Array(analyser.frequencyBinCount);
      src.connect(analyser);

      audioChunks=[];
      // Pick best supported MIME type: webm (Chrome/FF), mp4 (Safari/iOS), or browser default
      const mimeType=MediaRecorder.isTypeSupported('audio/webm;codecs=opus')?'audio/webm;codecs=opus'
        :MediaRecorder.isTypeSupported('audio/webm')?'audio/webm'
        :MediaRecorder.isTypeSupported('audio/mp4')?'audio/mp4'
        :'';
      mediaRecorder=new MediaRecorder(stream, mimeType?{mimeType}:{});
      mediaRecorder.ondataavailable=e=>{ if(e.data.size>0) audioChunks.push(e.data); };
      mediaRecorder.onstop=()=>{
        cancelAnimationFrame(animFrame); clearInterval(recInterval);
        stream.getTracks().forEach(t=>t.stop());
        logUsage('voice_recording_stop',{id:item.id, durationSec:recSeconds});
        const blobType=mimeType||'audio/webm';
        audioBlob=new Blob(audioChunks,{type:blobType});
        const url=URL.createObjectURL(audioBlob);
        const pb=document.getElementById('voice-playback');
        pb.style.display='block';
        document.getElementById('vc-audio').src=url;
        document.getElementById('voice-status').textContent='Recording complete. Press Save to keep it.';
        document.getElementById('vc-record').style.display='';
        document.getElementById('vc-stop').style.display='none';
        drawIdle();
      };
      mediaRecorder.start();
      logUsage('voice_recording_start',{id:item.id});
      recSeconds=0;
      recInterval=setInterval(()=>{
        recSeconds++;
        document.getElementById('vc-duration').textContent=
          Math.floor(recSeconds/60)+':'+(recSeconds%60).toString().padStart(2,'0');
      },1000);
      document.getElementById('vc-record').style.display='none';
      document.getElementById('vc-stop').style.display='';
      document.getElementById('voice-status').innerHTML='<span class="recording-dot"></span> &nbsp;Recording…';
      drawWave();
    } catch(err){
      document.getElementById('voice-status').textContent='Microphone access denied. Please allow mic permissions.';
      logUsage('voice_mic_denied');
    }
  });

  document.getElementById('vc-stop').addEventListener('click',()=>{
    if(mediaRecorder&&mediaRecorder.state!=='inactive') mediaRecorder.stop();
  });

  function doSave(){
    clearInterval(recInterval); cancelAnimationFrame(animFrame);
    if(mediaRecorder&&mediaRecorder.state!=='inactive') mediaRecorder.stop();
    const labelEl=document.getElementById('item-label');
    item.label=labelEl?labelEl.value||'Voice':'Voice';
    item.duration=document.getElementById('vc-duration').textContent||'';
    if(audioBlob){
      const reader=new FileReader();
      reader.onload=ev=>{
        item.content=ev.target.result;
        closeModal(); renderLibrary(); rerender();
        logUsage('voice_save',{id:item.id, durationMs:Date.now()-_voiceOpenedAt, recordingDurationSec:recSeconds}); toast('Saved');
      };
      reader.readAsDataURL(audioBlob);
    } else {
      item.label=item.label||origLabel;
      closeModal(); renderLibrary(); rerender(); toast('Saved');
    }
  }
  function doDiscard(){
    clearInterval(recInterval); cancelAnimationFrame(animFrame);
    if(mediaRecorder&&mediaRecorder.state!=='inactive') mediaRecorder.stop();
    item.content=origContent; item.label=origLabel; item.duration=origDuration;
    logUsage('voice_discard',{id:item.id, durationMs:Date.now()-_voiceOpenedAt});
    closeModal();
  }
  state._saveAndClose=doSave;

  modalFooter.innerHTML =
    `<button class="btn btn-primary" id="save-voice">${ico('check')}Save</button>` +
    '<button class="btn btn-ghost btn-danger-soft" id="discard-voice">Discard changes</button>';
  openModal();
  document.getElementById('save-voice').addEventListener('click',doSave);
  document.getElementById('discard-voice').addEventListener('click',doDiscard);
  const _voiceOpenedAt = Date.now();
  logUsage('voice_editor_open',{id:item.id});
}

//  CANVAS DROP (card repositioning)
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
canvasWrap.addEventListener('dragover',e=>{
  if(state.dragCardKey){e.preventDefault();e.dataTransfer.dropEffect='move';}
});
canvasWrap.addEventListener('drop',e=>{
  if(!state.dragCardKey||e.target.closest('.cell-wrapper')) return;
  const from=state.dragCardKey; state.dragCardKey=null;
  document.querySelectorAll('.card.drop-target').forEach(c=>c.classList.remove('drop-target'));
  const rect=canvasWrap.getBoundingClientRect();
  const dropX=(e.clientX-rect.left-state.panX)/state.zoom;
  const dropY=(e.clientY-rect.top -state.panY)/state.zoom;
  const keys=Object.keys(state.cells);
  let minR=Infinity,minC=Infinity;
  keys.forEach(k=>{const[r,c]=k.split(',').map(Number);minR=Math.min(minR,r);minC=Math.min(minC,c);});
  let bestKey=null,bestDist=Infinity;
  keys.forEach(k=>{
    if(k===from) return;
    const[r,c]=k.split(',').map(Number);
    const d=Math.hypot(dropX-((c-minC)*SLOT_W+CELL_W/2),dropY-((r-minR)*SLOT_H+CELL_H/2));
    if(d<bestDist){bestDist=d;bestKey=k;}
  });
  if(!bestKey){rerender();return;}
  const[br,bc]=bestKey.split(',').map(Number);
  const dx=dropX-((bc-minC)*SLOT_W+CELL_W/2), dy=dropY-((br-minR)*SLOT_H+CELL_H/2);
  const dir=Math.abs(dx)>=Math.abs(dy)?(dx>0?'right':'left'):(dy>0?'bottom':'top');
  const target=neighbourKey(br,bc,dir);
  const fromCell={...state.cells[from]};

  // Snapshot grid origin before mutation
  function gridMin(){
    let mR=Infinity,mC=Infinity;
    Object.keys(state.cells).forEach(k=>{
      const[r,c]=k.split(',').map(Number);
      mR=Math.min(mR,r); mC=Math.min(mC,c);
    });
    return{mR,mC};
  }
  const before=gridMin();

  if(state.cells[target]){
    state.cells[from]={...state.cells[target]};
    state.cells[target]=fromCell;
    logUsage('card_swap_bg',{from,to:target});
  } else {
    delete state.cells[from];
    state.cells[target]=fromCell;
    logUsage('card_move',{from,to:target});
  }

  // Compensate pan if grid origin shifted
  const after=gridMin();
  const dC=before.mC-after.mC, dR=before.mR-after.mR;
  if(dC!==0) state.panX-=dC*SLOT_W*state.zoom;
  if(dR!==0) state.panY-=dR*SLOT_H*state.zoom;

  rerender();
});

//  PAN & ZOOM
// â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function updateTransform(){
  canvasEl.style.transform=`translate(${state.panX}px,${state.panY}px) scale(${state.zoom})`;
  document.getElementById('zoom-label').textContent=`${Math.round(state.zoom*100)}%`;
}
function cellBounds(){
  let minR=Infinity,maxR=-Infinity,minC=Infinity,maxC=-Infinity;
  for(const k of Object.keys(state.cells)){
    const[r,c]=k.split(',').map(Number);
    minR=Math.min(minR,r);maxR=Math.max(maxR,r);minC=Math.min(minC,c);maxC=Math.max(maxC,c);
  }
  return minR===Infinity?{minR:0,maxR:0,minC:0,maxC:0}:{minR,maxR,minC,maxC};
}
function centerView(){
  const{minR,maxR,minC,maxC}=cellBounds();
  const gw=(maxC-minC+1)*SLOT_W-CELL_GAP, gh=(maxR-minR+1)*SLOT_H-CELL_GAP;
  const vw=canvasWrap.clientWidth, vh=canvasWrap.clientHeight;
  state.zoom=Math.min(1,vw/(gw+80),vh/(gh+80));
  state.panX=(vw-gw*state.zoom)/2; state.panY=(vh-gh*state.zoom)/2;
  updateTransform();
}
let panning=false,panStart={x:0,y:0},panOrigin={x:0,y:0};
canvasWrap.addEventListener('mousedown',e=>{
  if((e.button!==0&&e.button!==1)||(e.button===0&&e.target.closest('.cell-wrapper'))) return;
  panning=true; canvasWrap.classList.add('grabbing');
  panStart={x:e.clientX,y:e.clientY}; panOrigin={x:state.panX,y:state.panY};
  e.preventDefault();
});
window.addEventListener('mousemove',e=>{
  if(!panning) return;
  state.panX=panOrigin.x+(e.clientX-panStart.x);
  state.panY=panOrigin.y+(e.clientY-panStart.y);
  updateTransform();
});
window.addEventListener('mouseup',()=>{ panning=false; canvasWrap.classList.remove('grabbing'); });
canvasWrap.addEventListener('wheel',e=>{
  e.preventDefault();
  const factor=e.deltaY<0?1.08:0.92;
  const rect=canvasWrap.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const nz=Math.min(2,Math.max(.2,state.zoom*factor));
  state.panX=mx-(mx-state.panX)*(nz/state.zoom);
  state.panY=my-(my-state.panY)*(nz/state.zoom);
  state.zoom=nz; updateTransform();
},{passive:false});
document.getElementById('zoom-in') .addEventListener('click',()=>{state.zoom=Math.min(2,state.zoom*1.15);updateTransform();});
document.getElementById('zoom-out').addEventListener('click',()=>{state.zoom=Math.max(.2,state.zoom*.85);updateTransform();});

// ── Touch drag-and-drop for card grid ─────────────────────────────────────
// Tracks a library item being dragged via touch/pointer
let _touchDragId=null;       // library item id being dragged
let _touchDragEl=null;       // floating ghost element
let _touchDragCardKey=null;  // card key being repositioned

function makeTouchGhost(item){
  const el=document.createElement('canvas');
  el.width=84; el.height=80;
  Object.assign(el.style,{
    position:'fixed',pointerEvents:'none',zIndex:'9999',
    borderRadius:'8px',opacity:'0.85',transform:'translate(-50%,-50%)'
  });
  const ctx=el.getContext('2d');
  const col=item.type==='sketch'?'#B85C1A':item.type==='voice'?'#2A7A4B':item.type==='model'?'#7B3FA0':'#2D5A8E';
  ctx.fillStyle='#fff'; ctx.fillRect(2,2,80,76);
  ctx.strokeStyle=col; ctx.lineWidth=2; ctx.strokeRect(2,2,80,76);
  ctx.fillStyle=col; ctx.fillRect(2,2,80,9);
  document.body.appendChild(el);
  return el;
}

function moveTouchGhost(el, cx, cy){
  el.style.left=cx+'px'; el.style.top=cy+'px';
}

function cardKeyAtPoint(cx, cy){
  // Temporarily hide ghost so elementFromPoint works
  if(_touchDragEl) _touchDragEl.style.display='none';
  const el=document.elementFromPoint(cx,cy);
  if(_touchDragEl) _touchDragEl.style.display='';
  const card=el?.closest?.('.card');
  return card?.dataset?.key||null;
}

// Wire up touch drag on library items — we use touchstart/touchmove/touchend
// directly (not pointer events) for compatibility with iOS Safari
function wireLibItemTouch(el, item){
  let dragging=false;
  el.addEventListener('touchstart', e=>{
    if(e.touches.length!==1) return;
    dragging=false;
  },{passive:true});
  el.addEventListener('touchmove', e=>{
    if(e.touches.length!==1) return;
    e.preventDefault();
    const t=e.touches[0];
    if(!dragging){
      dragging=true;
      _touchDragId=item.id;
      _touchDragEl=makeTouchGhost(item);
    }
    moveTouchGhost(_touchDragEl,t.clientX,t.clientY);
    // Highlight card underneath
    const key=cardKeyAtPoint(t.clientX,t.clientY);
    document.querySelectorAll('.card.drop-target').forEach(c=>c.classList.remove('drop-target'));
    if(key) document.querySelector(`.card[data-key="${key}"]`)?.classList.add('drop-target');
  },{passive:false});
  el.addEventListener('touchend', e=>{
    document.querySelectorAll('.card.drop-target').forEach(c=>c.classList.remove('drop-target'));
    if(!dragging||!_touchDragEl){ _touchDragId=null; return; }
    const t=e.changedTouches[0];
    const key=cardKeyAtPoint(t.clientX,t.clientY);
    document.body.removeChild(_touchDragEl);
    _touchDragEl=null;
    const id=_touchDragId; _touchDragId=null;
    if(key){
      state.cells[key].libraryItemId=id;
      const _tli=getLibItem(id);
      if(_tli?.label) state.cells[key].title=_tli.label;
      logUsage('lib_item_assigned_touch',{cardKey:key,itemId:id});
      rerender();
    }
  });
}

// Touch-based card repositioning
function wireCardTouch(card, key){
  let dragging=false, ghost=null;
  card.addEventListener('touchstart',e=>{
    if(e.touches.length!==1) return;
    dragging=false;
  },{passive:true});
  card.addEventListener('touchmove',e=>{
    if(e.touches.length!==1||_touchDragId) return;
    e.preventDefault();
    const t=e.touches[0];
    if(!dragging){
      dragging=true;
      _touchDragCardKey=key;
      const item=state.cells[key]?.libraryItemId?getLibItem(state.cells[key].libraryItemId):null;
      ghost=item?makeTouchGhost(item):makeTouchGhost({type:'text'});
    }
    moveTouchGhost(ghost,t.clientX,t.clientY);
    const hk=cardKeyAtPoint(t.clientX,t.clientY);
    document.querySelectorAll('.card.drop-target').forEach(c=>c.classList.remove('drop-target'));
    if(hk&&hk!==key) document.querySelector(`.card[data-key="${hk}"]`)?.classList.add('drop-target');
  },{passive:false});
  card.addEventListener('touchend',e=>{
    document.querySelectorAll('.card.drop-target').forEach(c=>c.classList.remove('drop-target'));
    if(!dragging||!ghost){ _touchDragCardKey=null; return; }
    const t=e.changedTouches[0];
    const targetKey=cardKeyAtPoint(t.clientX,t.clientY);
    document.body.removeChild(ghost); ghost=null;
    const fromKey=_touchDragCardKey; _touchDragCardKey=null;
    if(targetKey&&targetKey!==fromKey){
      const a={...state.cells[fromKey]}, b={...state.cells[targetKey]};
      state.cells[fromKey]=b; state.cells[targetKey]=a;
      logUsage('card_swap_touch',{from:fromKey,to:targetKey});
      rerender();
    }
  });
}

// Canvas pan via touch (single finger on blank canvas area)
let _canvasTouchPan=null;
canvasWrap.addEventListener('touchstart',e=>{
  if(e.touches.length!==1) return;
  const t=e.touches[0];
  if(t.target.closest('.cell-wrapper')) return; // let card handle it
  _canvasTouchPan={sx:t.clientX,sy:t.clientY,ox:state.panX,oy:state.panY};
},{passive:true});
canvasWrap.addEventListener('touchmove',e=>{
  if(!_canvasTouchPan||e.touches.length!==1) return;
  e.preventDefault();
  const t=e.touches[0];
  state.panX=_canvasTouchPan.ox+(t.clientX-_canvasTouchPan.sx);
  state.panY=_canvasTouchPan.oy+(t.clientY-_canvasTouchPan.sy);
  updateTransform();
},{passive:false});
canvasWrap.addEventListener('touchend',()=>{ _canvasTouchPan=null; });

// Pinch-to-zoom on canvas
let _pinchDist=null;
canvasWrap.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    const dx=e.touches[0].clientX-e.touches[1].clientX;
    const dy=e.touches[0].clientY-e.touches[1].clientY;
    _pinchDist=Math.hypot(dx,dy);
    _canvasTouchPan=null; // cancel pan
  }
},{passive:true});
canvasWrap.addEventListener('touchmove',e=>{
  if(e.touches.length!==2||_pinchDist===null) return;
  e.preventDefault();
  const dx=e.touches[0].clientX-e.touches[1].clientX;
  const dy=e.touches[0].clientY-e.touches[1].clientY;
  const dist=Math.hypot(dx,dy);
  const factor=dist/_pinchDist; _pinchDist=dist;
  const rect=canvasWrap.getBoundingClientRect();
  const mx=(e.touches[0].clientX+e.touches[1].clientX)/2-rect.left;
  const my=(e.touches[0].clientY+e.touches[1].clientY)/2-rect.top;
  const nz=Math.min(2,Math.max(.2,state.zoom*factor));
  state.panX=mx-(mx-state.panX)*(nz/state.zoom);
  state.panY=my-(my-state.panY)*(nz/state.zoom);
  state.zoom=nz; updateTransform();
},{passive:false});
canvasWrap.addEventListener('touchend',()=>{ _pinchDist=null; });

import * as THREE from 'three';

// â”€â”€ Card preview: one tiny Three.js scene per model card â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function initModelPreviews(){
  document.querySelectorAll('.card-model-preview[data-model-id]').forEach(container=>{
    const item = getLibItem(container.dataset.modelId);
    if(!item || !item.shapes || !item.shapes.length) return;
    startModelPreview(container, item.shapes);
  });
}

function startModelPreview(container, shapes){
  const W = container.clientWidth  || 200;
  const H = container.clientHeight || 120;

  const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setSize(W, H);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.shadowMap.enabled = true;
  container.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xe8eef7);

  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
  camera.position.set(4,3,5);

  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const dLight = new THREE.DirectionalLight(0xffffff, 0.9);
  dLight.position.set(5,8,5); scene.add(dLight);

  buildSceneMeshes(scene, shapes);

  // Static preview – render once, no animation loop
  camera.lookAt(0,0,0);
  renderer.render(scene, camera);
  // disposer: stop loop + free GPU memory when card is re-rendered
  window._modelPreviewDisposers = window._modelPreviewDisposers || [];
  window._modelPreviewDisposers.push(()=>{
    renderer.domElement.remove();
    renderer.dispose();
    scene.traverse(obj=>{ if(obj.geometry) obj.geometry.dispose(); if(obj.material) obj.material.dispose(); });
  });
}

// â”€â”€ Build Three.js meshes from shapes array â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function buildSceneMeshes(scene, shapes){
  shapes.forEach(s=>{
    let geo;
    if(s.kind === 'box')    geo = new THREE.BoxGeometry(s.sx||1, s.sy||1, s.sz||1);
    else                    geo = new THREE.SphereGeometry((s.r||0.5), 32, 24);
    const mat = new THREE.MeshLambertMaterial({color: s.color || 0x2D5A8E});
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(s.x||0, s.y||0, s.z||0);
    mesh.castShadow = true;
    scene.add(mesh);
  });
  // light semi-transparent grid
  const previewGrid = new THREE.GridHelper(10, 10, 0xaabbcc, 0xccddee);
  previewGrid.material.transparent = true;
  previewGrid.material.opacity = 0.5;
  scene.add(previewGrid);
}

// â”€â”€ Render thumbnail PNG from shapes â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function renderModelThumbnail(shapes){
  const W=300, H=200;
  const renderer = new THREE.WebGLRenderer({antialias:true, preserveDrawingBuffer:true});
  renderer.setSize(W,H);
  const scene = new THREE.Scene(); scene.background = new THREE.Color(0xe8eef7);
  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
  camera.position.set(5,4,6); camera.lookAt(0,0,0);
  scene.add(new THREE.AmbientLight(0xffffff,0.6));
  const dl=new THREE.DirectionalLight(0xffffff,0.9); dl.position.set(5,8,5); scene.add(dl);
  const thumbGrid = new THREE.GridHelper(10,10,0xaabbcc,0xccddee);
  thumbGrid.material.transparent = true; thumbGrid.material.opacity = 0.5;
  scene.add(thumbGrid);
  buildSceneMeshes(scene,shapes);
  renderer.render(scene,camera);
  const dataUrl = renderer.domElement.toDataURL('image/png');
  renderer.dispose();
  return dataUrl;
}
